<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panel Moderador | Kotatsu</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link rel="stylesheet" href="buscador.css">
  <style>
    body{margin:0;background:var(--bg);color:var(--text);font-family:'Rajdhani',sans-serif;}

    /* ── Nav ── */
    .top-nav{
      display:flex;justify-content:space-between;align-items:center;
      padding:10px 18px;border-bottom:1px solid var(--border);
      background:rgba(10,10,15,0.94);backdrop-filter:blur(14px);
      position:sticky;top:0;z-index:50;gap:10px;
    }
    .nav-left{display:flex;align-items:center;gap:10px;flex-shrink:0;}

    /* Marca → index.html, color amarillo/mod */
    .brand{
      font-family:'Cinzel Decorative';color:#f59e0b;font-size:1.05rem;
      cursor:pointer;transition:opacity .2s;text-decoration:none;
      display:inline-flex;align-items:center;gap:6px;
    }
    .brand:hover{opacity:.75;}
    .brand-home-icon{font-size:.65rem;color:var(--text-muted);}

    /* ── Chip de sesión (color mod = amber) ── */
    .session-chip-wrap{position:relative;}
    .session-chip{
      display:flex;align-items:center;gap:8px;padding:5px 12px 5px 6px;
      background:rgba(26,26,40,.8);border:1px solid var(--border);
      border-radius:50px;cursor:pointer;transition:all .2s;
      font-family:'Rajdhani';font-size:.78rem;font-weight:700;
    }
    .session-chip:hover{border-color:#f59e0b;box-shadow:0 0 12px rgba(245,158,11,.15);}
    .session-chip.open{border-color:#f59e0b;}
    .sc-avatar{
      width:28px;height:28px;border-radius:50%;
      border:2px solid rgba(245,158,11,.5);background:var(--bg);
      display:flex;align-items:center;justify-content:center;
      font-size:.7rem;font-weight:700;color:#f59e0b;overflow:hidden;flex-shrink:0;
    }
    .sc-avatar img{width:100%;height:100%;object-fit:cover;border-radius:50%;}
    .sc-name{max-width:110px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text);}
    .sc-caret{font-size:.6rem;color:var(--text-muted);transition:transform .2s;margin-left:2px;}
    .session-chip.open .sc-caret{transform:rotate(180deg);}

    /* ── Dropdown sesiones ── */
    .session-dropdown{
      position:absolute;top:calc(100% + 8px);right:0;
      background:#12121e;border:1px solid var(--border);
      border-radius:14px;padding:10px;width:260px;
      box-shadow:0 16px 40px rgba(0,0,0,.75);
      display:none;flex-direction:column;gap:6px;z-index:200;
    }
    .session-dropdown.open{display:flex;animation:sdDown .15s ease;}
    @keyframes sdDown{from{opacity:0;transform:translateY(-5px)}to{opacity:1;transform:translateY(0)}}
    .sd-header{font-size:.58rem;font-weight:700;letter-spacing:.15em;text-transform:uppercase;
      color:var(--text-muted);padding-bottom:8px;border-bottom:1px solid var(--border);margin-bottom:2px;}
    .sd-accounts{max-height:280px;overflow-y:auto;display:flex;flex-direction:column;gap:5px;}
    .sd-accounts::-webkit-scrollbar{width:3px;}
    .sd-accounts::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
    .sd-chip{display:flex;align-items:center;gap:8px;padding:8px 10px;
      background:rgba(26,26,40,.9);border-radius:9px;border:1px solid var(--border);cursor:pointer;transition:.18s;}
    .sd-chip:hover{border-color:#f59e0b;background:#1a1a28;}
    .sd-chip.active-chip{border-color:rgba(245,158,11,.35);background:rgba(245,158,11,.04);}
    .sd-av{width:30px;height:30px;border-radius:50%;background:var(--bg);border:2px solid var(--border);
      flex-shrink:0;overflow:hidden;display:flex;align-items:center;justify-content:center;
      font-size:.75rem;font-weight:700;color:#f59e0b;}
    .sd-av img{width:100%;height:100%;object-fit:cover;}
    .sd-info{flex:1;min-width:0;}
    .sd-name{font-size:.82rem;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .sd-email{font-size:.6rem;color:var(--text-muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .sd-role{font-size:.52rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:1px 6px;border-radius:20px;flex-shrink:0;}
    .sd-role.user {background:rgba(76,175,80,.15);color:#4CAF50;}
    .sd-role.mod  {background:rgba(245,158,11,.15);color:#f59e0b;}
    .sd-role.admin{background:rgba(6,182,212,.15);color:#06b6d4;}
    .sd-role.owner{background:rgba(230,62,109,.15);color:#e63e6d;}
    .sd-active-dot{width:6px;height:6px;border-radius:50%;background:#4CAF50;flex-shrink:0;}
    .sd-divider{height:1px;background:var(--border);margin:2px 0;}
    .sd-action{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:9px;border:none;
      background:transparent;font-family:'Rajdhani';font-size:.75rem;font-weight:700;cursor:pointer;
      transition:.18s;color:var(--text-muted);text-transform:uppercase;letter-spacing:.08em;width:100%;}
    .sd-action:hover{color:var(--accent);background:rgba(230,62,109,.06);}
    .sd-action i{font-size:.8rem;}

    /* ── Nav right ── */
    .nav-right{display:flex;gap:8px;align-items:center;}
    .btn-refresh{background:transparent;padding:7px 12px;border-radius:6px;color:#f59e0b;
      font-family:'Rajdhani';font-size:.75rem;font-weight:700;border:1px solid #f59e0b;
      transition:all .3s;cursor:pointer;white-space:nowrap;}
    .btn-refresh:hover{background:#f59e0b;color:#000;box-shadow:0 0 15px rgba(245,158,11,.35);}
    @keyframes spinOnce{0%{transform:rotate(0)}100%{transform:rotate(360deg)}}
    .spinning{animation:spinOnce .6s ease;}

    /* ── Layout ── */
    .container{max-width:1000px;margin:0 auto;padding:24px 18px 90px;}

    /* ── Perfil con drawer de foto ── */
    .profile-card{
      display:flex;align-items:center;gap:20px;
      background:var(--surface);border:1px solid rgba(245,158,11,.2);
      border-radius:18px;padding:20px 24px;flex-wrap:wrap;
      box-shadow:0 0 24px rgba(245,158,11,.04);
    }
    .avatar-wrap{position:relative;width:72px;height:72px;flex-shrink:0;}
    .avatar-wrap img{width:100%;height:100%;border-radius:50%;object-fit:cover;border:3px solid #f59e0b;background:#1a1a28;display:block;}
    .avatar-btn{
      position:absolute;bottom:2px;right:2px;width:24px;height:24px;border-radius:50%;
      background:#f59e0b;border:2px solid var(--surface);color:#000;font-size:.6rem;
      cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.2s;
    }
    .avatar-btn:hover{transform:scale(1.12);}
    .profile-info .role-label{color:#f59e0b;font-size:.62rem;letter-spacing:3px;font-weight:700;text-transform:uppercase;}
    .profile-info h2{color:#fff;margin:4px 0 0;font-size:1.25rem;}
    .profile-info .pid{color:var(--text-muted);font-size:.7rem;margin-top:3px;}

    /* Drawer de foto */
    .photo-drawer{
      background:#12121e;border:1px solid var(--border);border-top:none;
      border-radius:0 0 18px 18px;max-height:0;overflow:hidden;
      transition:max-height .4s,padding .3s,opacity .3s;opacity:0;
    }
    .photo-drawer.open{max-height:120px;padding:14px 24px;opacity:1;}
    .photo-row{display:flex;gap:10px;}
    .photo-row input{flex:1;min-width:0;background:#0a0a0f;border:1px solid var(--border);
      padding:10px 13px;border-radius:10px;color:#fff;font-family:'Rajdhani';font-size:.9rem;outline:none;transition:.2s;}
    .photo-row input:focus{border-color:#f59e0b;}
    .photo-row button{background:#f59e0b;color:#000;border:none;padding:0 16px;
      border-radius:10px;font-weight:700;font-family:'Rajdhani';cursor:pointer;font-size:.85rem;white-space:nowrap;}

    /* ── Tabs ── */
    .panel-tabs{display:flex;margin-bottom:20px;border:1px solid var(--border);border-radius:12px;overflow:hidden;}
    .panel-tab{flex:1;padding:11px 6px;background:transparent;border:none;color:var(--text-muted);
      font-family:'Rajdhani';font-size:.75rem;font-weight:700;letter-spacing:.08em;
      text-transform:uppercase;cursor:pointer;transition:.2s;}
    .panel-tab.active{background:rgba(245,158,11,.12);color:#f59e0b;border-bottom:2px solid #f59e0b;}
    .panel-tab:hover:not(.active){color:var(--text);background:rgba(255,255,255,.03);}

    /* ── Búsqueda + filtro ── */
    .search-row{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;}
    .search-row input,.search-row select{
      background:var(--surface);border:1px solid var(--border);
      padding:9px 13px;border-radius:10px;color:#fff;outline:none;
      font-family:'Rajdhani';font-size:.9rem;transition:.2s;
    }
    .search-row input{flex:1;min-width:140px;}
    .search-row input:focus{border-color:#f59e0b;}
    .search-row select:focus{border-color:#f59e0b;}
    .search-row select option{background:#1a1a28;}

    /* ── Item card ── */
    .item-card{
      background:var(--surface);border:1px solid var(--border);
      border-radius:12px;padding:12px 14px;
      display:flex;align-items:flex-start;gap:12px;
      margin-bottom:9px;transition:border-color .2s,box-shadow .2s;
    }
    .item-card:hover{border-color:rgba(245,158,11,.3);box-shadow:0 2px 14px rgba(245,158,11,.06);}

    /* Portada obra */
    .item-cover{
      width:46px;height:64px;border-radius:6px;
      border:1px solid var(--border);flex-shrink:0;overflow:hidden;
      background:var(--surface);display:flex;align-items:center;justify-content:center;font-size:1.1rem;
    }
    .item-cover img{width:100%;height:100%;object-fit:cover;}

    /* Avatar persona */
    .persona-av{
      width:50px;height:50px;border-radius:50%;
      border:2px solid var(--border);flex-shrink:0;overflow:hidden;
      background:var(--surface);display:flex;align-items:center;justify-content:center;font-size:1.3rem;
      align-self:center;
    }
    .persona-av img{width:100%;height:100%;object-fit:cover;border-radius:50%;}
    .persona-av.bautor{border-color:#4CAF50;}

    .item-info{flex:1;min-width:0;}
    /* Sin truncar — nombre completo */
    .item-info h4{margin:0 0 4px;color:#fff;font-size:.92rem;word-break:break-word;line-height:1.35;}
    .item-info small{color:var(--text-muted);font-size:.72rem;display:block;margin-top:2px;}

    /* Badges */
    .badge{display:inline-block;font-size:.58rem;font-weight:700;padding:2px 7px;border-radius:9px;margin-left:5px;text-transform:uppercase;vertical-align:middle;}
    .badge-aprobado  {color:#4CAF50;background:rgba(76,175,80,.1);border:1px solid #4CAF50;}
    .badge-pendiente {color:#f59e0b;background:rgba(245,158,11,.1);border:1px solid #f59e0b;}
    .badge-revision  {color:var(--accent3);background:rgba(6,182,212,.1);border:1px solid var(--accent3);}
    .badge-suspension,.badge-rechazado{color:var(--accent);background:rgba(230,62,109,.1);border:1px solid var(--accent);}
    .badge-activo    {color:#4CAF50;background:rgba(76,175,80,.1);border:1px solid #4CAF50;}
    .badge-suspendido{color:var(--accent);background:rgba(230,62,109,.1);border:1px solid var(--accent);}

    /* Botones de acción */
    .item-actions{display:flex;gap:6px;flex-wrap:wrap;flex-shrink:0;align-items:flex-start;padding-top:2px;}
    .btn-action{
      background:none;border:1px solid var(--border);color:var(--text-muted);
      padding:5px 10px;border-radius:7px;cursor:pointer;font-family:'Rajdhani';
      font-size:.7rem;font-weight:700;transition:.2s;white-space:nowrap;
      display:flex;align-items:center;gap:4px;
    }
    .btn-action.approve{border-color:#4CAF50;color:#4CAF50;}
    .btn-action.approve:hover{background:#4CAF50;color:#000;}
    .btn-action.suspend{border-color:var(--accent);color:var(--accent);}
    .btn-action.suspend:hover{background:var(--accent);color:#fff;}
    .btn-action.review{border-color:#f59e0b;color:#f59e0b;}
    .btn-action.review:hover{background:#f59e0b;color:#000;}
        .btn-action.edit{border-color:var(--accent3);color:var(--accent3);}
    .btn-action.edit:hover{background:var(--accent3);color:#000;}

    /* ── Modal ── */
    .overlay{position:fixed;inset:0;background:rgba(0,0,0,.84);display:flex;align-items:center;
      justify-content:center;z-index:200;padding:20px;opacity:0;pointer-events:none;transition:opacity .3s;}
    .overlay.open{opacity:1;pointer-events:all;}
    .modal-box{background:#12121e;border:1px solid var(--border);border-radius:20px;padding:26px;
      width:100%;max-width:460px;transform:scale(.95);transition:transform .3s;}
    .overlay.open .modal-box{transform:scale(1);}
    .modal-box h3{font-family:'Cinzel Decorative';color:#f59e0b;margin:0 0 16px;font-size:.95rem;}
    .field{margin-bottom:12px;}
    .field label{display:block;font-size:.65rem;color:var(--text-muted);font-weight:700;letter-spacing:2px;text-transform:uppercase;margin-bottom:6px;}
    .field textarea{width:100%;background:#0a0a0f;border:1px solid var(--border);
      padding:11px 13px;border-radius:10px;color:#fff;font-family:'Rajdhani';
      font-size:.92rem;resize:vertical;min-height:90px;outline:none;transition:.2s;box-sizing:border-box;}
    .field textarea:focus{border-color:#f59e0b;}
    .modal-err{color:var(--accent);font-size:.82rem;margin-top:8px;min-height:1.1em;text-align:center;}
    .modal-ok {color:#4CAF50;font-size:.82rem;margin-top:8px;min-height:1.1em;text-align:center;}
    .modal-actions{display:flex;gap:10px;margin-top:14px;}
    .btn-m{flex:1;padding:11px;border-radius:10px;border:none;font-family:'Rajdhani';font-weight:700;font-size:.88rem;cursor:pointer;transition:.2s;}
    .btn-m.cancel{background:var(--surface);color:var(--text-muted);border:1px solid var(--border);}
    .btn-m.cancel:hover{border-color:var(--accent);color:var(--accent);}
    .btn-m.confirm{background:linear-gradient(135deg,#f59e0b,#d97706);color:#000;}
    .btn-m.confirm:hover{filter:brightness(1.1);}

    /* Vacío */
    .empty{text-align:center;padding:50px 20px;color:var(--text-muted);border:1px dashed var(--border);border-radius:12px;}

    /* ── Responsive ── */
    @media(max-width:600px){
      .item-card{flex-wrap:wrap;}
      .item-actions{width:100%;}
      .sc-name{max-width:70px;}
    }
    @media(max-width:480px){
      .top-nav{padding:10px 12px;}
      .brand{font-size:.9rem;}
      .container{padding:16px 12px 90px;}
      .profile-card{padding:14px 16px;gap:14px;}
    }
  </style>
</head>
<body>
  <div class="bg-grid"></div>

  <nav class="top-nav">
    <!-- Marca clickeable → index.html -->
    <div class="nav-left">
      <a href="index.html" class="brand" title="Ir al inicio">
        <i class="fas fa-house brand-home-icon"></i>
        KOTATSUNAME
      </a>
    </div>

    <div class="nav-right">
      <button class="btn-refresh" id="btnRefresh" onclick="refrescar()" title="Actualizar datos">
        <i class="fas fa-rotate-right" id="refreshIcon"></i>
      </button>

      <!-- Chip de sesión con dropdown -->
      <div class="session-chip-wrap" id="sessionChipWrap">
        <div class="session-chip" id="sessionChip" onclick="toggleSessionDropdown(event)">
          <div class="sc-avatar" id="scAvatar">
            <img id="scAvatarImg" src="" alt="" style="display:none">
            <span id="scAvatarInitial"></span>
          </div>
          <span class="sc-name" id="scName"></span>
          <i class="fas fa-chevron-down sc-caret"></i>
        </div>
        <div class="session-dropdown" id="sessionDropdown">
          <div class="sd-header"><i class="fas fa-id-card" style="margin-right:5px"></i>Sesiones guardadas</div>
          <div class="sd-accounts" id="sdAccountsList"></div>
          <div class="sd-divider"></div>
          <button class="sd-action" onclick="cerrarSesion()">
            <i class="fas fa-power-off"></i> Cerrar sesión
          </button>
        </div>
      </div>
    </div>
  </nav>

  <main class="container">

    <!-- Perfil con drawer de foto -->
    <div style="margin-bottom:24px;">
      <div class="profile-card">
        <div class="avatar-wrap">
          <img id="modAvatar"
            src="data:image/svg+xml,<svg viewBox='0 0 1 1' fill='%231a1a28' xmlns='http://www.w3.org/2000/svg'><rect width='1' height='1'/></svg>"
            alt="Avatar"/>
          <button class="avatar-btn" onclick="togglePhotoDrawer()" title="Cambiar foto de perfil">
            <i class="fas fa-camera"></i>
          </button>
        </div>
        <div class="profile-info">
          <p class="role-label">Panel de Moderación</p>
          <h2 id="modName">Moderador</h2>
          <p class="pid" id="modEmail"></p>
        </div>
      </div>
      <div class="photo-drawer" id="photoDrawer">
        <div class="photo-row">
          <input type="text" id="driveInput" placeholder="Enlace de Google Drive para la foto de perfil…"/>
          <button onclick="guardarFoto()">Actualizar</button>
        </div>
      </div>
    </div>

    <!-- Tabs -->
    <div class="panel-tabs">
      <button class="panel-tab active" id="tabObras"   onclick="switchTab('obras')">Obras</button>
      <button class="panel-tab"        id="tabAutores" onclick="switchTab('autores')">Autores</button>
    </div>

    <!-- Búsqueda + filtro de estado -->
    <div class="search-row">
      <input type="text" id="searchBar" placeholder="Buscar por título, autor o ID…" oninput="filtrar()"/>
      <select id="filterEstado" onchange="filtrar()">
        <option value="">Todos los estados</option>
        <option value="aprobado">Aprobado</option>
        <option value="pendiente">Pendiente</option>
        <option value="revision">En revisión</option>
        <option value="suspension">Suspendido (obra)</option>
        <option value="activo">Activo</option>
        <option value="suspendido">Suspendido (autor)</option>
      </select>
    </div>

    <div id="tabContent">
      <div class="empty"><i class="fas fa-spinner fa-spin"></i>&nbsp; Cargando…</div>
    </div>
  </main>

  <!-- Modal de acción con motivo -->
  <div class="overlay" id="modalOverlay">
    <div class="modal-box">
      <h3 id="modalTitulo">Acción</h3>
      <div class="field">
        <label>Motivo</label>
        <textarea id="motivoInput" placeholder="Describe el motivo de esta acción…"></textarea>
      </div>
      <div class="modal-err" id="modalErr"></div>
      <div class="modal-ok"  id="modalOk"></div>
      <div class="modal-actions">
        <button class="btn-m cancel"  onclick="cerrarModal()">Cancelar</button>
        <button class="btn-m confirm" id="btnConfirm" onclick="confirmarAccion()">Confirmar</button>
      </div>
    </div>
  </div>

  <script type="module">
    import { requireRole, clearSession } from "./staff_auth.js";
    import { loadEscritos } from "./escritos_data.js";

    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxlwm_htimcLqGW7p5HQvdgqwY1V7tlr3oEt5vl6FMZ8j6TGyB3V8t4Dwd2t8vU9AZA/exec";

    requireRole(["mod"]);

    const modId    = localStorage.getItem("ktt_id")    || "";
    const modEmail = localStorage.getItem("ktt_email") || "";
    const modName  = localStorage.getItem("ktt_user")  || "Moderador";
    const modFoto  = localStorage.getItem("ktt_foto")  || "";

    document.getElementById("modName").textContent  = modName;
    document.getElementById("modEmail").textContent = modEmail;
    if (modFoto) document.getElementById("modAvatar").src = modFoto;

    // ── Chip de sesión ──
    initSessionChip();

    function initSessionChip() {
      const nameEl = document.getElementById("scName");
      const img    = document.getElementById("scAvatarImg");
      const ini    = document.getElementById("scAvatarInitial");
      nameEl.textContent = modName;
      if (modFoto) {
        img.src = modFoto; img.style.display = "block"; ini.style.display = "none";
        img.onerror = () => { img.style.display = "none"; ini.style.display = ""; ini.textContent = (modName||"?")[0].toUpperCase(); };
      } else {
        ini.textContent = (modName||"?")[0].toUpperCase();
      }
      renderSessionDropdown();
    }

    function renderSessionDropdown() {
      const list = document.getElementById("sdAccountsList");
      list.innerHTML = "";
      let accounts = [];
      try { accounts = JSON.parse(localStorage.getItem("ktt_device_accounts") || "[]"); } catch {}
      if (!Array.isArray(accounts)) accounts = [];

      const roleLabels = { user:"Autor", mod:"Moderador", admin:"Admin", owner:"Owner" };

      if (accounts.length === 0) {
        list.innerHTML = `<p style="font-size:.72rem;color:var(--text-muted);text-align:center;padding:8px 0;">Sin otras sesiones guardadas.</p>`;
        return;
      }
      accounts.forEach(acc => {
        const isActive = acc.email === modEmail;
        const chip     = document.createElement("div");
        chip.className = `sd-chip${isActive ? " active-chip" : ""}`;
        chip.title     = isActive ? "Sesión actual" : "Cambiar a esta cuenta";
        const initial  = (acc.nombre||"?")[0].toUpperCase();
        chip.innerHTML = `
          <div class="sd-av">
            ${acc.foto ? `<img src="${esc(acc.foto)}" alt="" onerror="this.parentElement.textContent='${initial}'">` : initial}
          </div>
          <div class="sd-info">
            <div class="sd-name">${esc(acc.nombre)}</div>
            <div class="sd-email">${esc(acc.email)}</div>
          </div>
          <span class="sd-role ${acc.rol||"user"}">${roleLabels[acc.rol]||"Autor"}</span>
          ${isActive ? `<div class="sd-active-dot" title="Activa"></div>` : ""}
        `;
        chip.onclick = () => {
          closeSessionDropdown();
          if (isActive) return;
          sessionStorage.setItem("ktt_prefill_email", acc.email);
          clearSession();
          window.location.href = "registrarse.html";
        };
        list.appendChild(chip);
      });
    }

    window.toggleSessionDropdown = (e) => {
      e && e.stopPropagation();
      const chip = document.getElementById("sessionChip");
      const dd   = document.getElementById("sessionDropdown");
      const open = dd.classList.toggle("open");
      chip.classList.toggle("open", open);
    };
    function closeSessionDropdown() {
      document.getElementById("sessionDropdown").classList.remove("open");
      document.getElementById("sessionChip").classList.remove("open");
    }
    document.addEventListener("click", e => {
      const wrap = document.getElementById("sessionChipWrap");
      if (wrap && !wrap.contains(e.target)) closeSessionDropdown();
    });

    // ── Cerrar sesión ──
    window.cerrarSesion = () => { clearSession(); window.location.href = "registrarse.html"; };

    // ── Foto de perfil ──
    window.togglePhotoDrawer = () => document.getElementById("photoDrawer").classList.toggle("open");

    window.guardarFoto = async () => {
      const val = document.getElementById("driveInput").value.trim();
      if (!val) return;
      const match = val.match(/[-\w]{25,}/);
      if (!match) { alert("Enlace de Drive no válido."); return; }
      const url = `https://wsrv.nl/?url=${encodeURIComponent(
        `https://drive.google.com/uc?export=view&id=${match[0]}`
      )}&w=300&output=webp`;

      document.getElementById("modAvatar").src = url;
      localStorage.setItem("ktt_foto", url);

      // Sincronizar chip de nav
      const img = document.getElementById("scAvatarImg");
      const ini = document.getElementById("scAvatarInitial");
      img.src = url; img.style.display = "block"; ini.style.display = "none";

      document.getElementById("photoDrawer").classList.remove("open");
      document.getElementById("driveInput").value = "";
      try {
        await fetch(SCRIPT_URL, {
          method:"POST", mode:"no-cors",
          body: JSON.stringify({ action:"actualizarFotoStaff", idStaff: modId, foto: url }),
        });
      } catch {}
    };

    // ── Refrescar ──
    window.refrescar = async () => {
      const icon = document.getElementById("refreshIcon");
      icon.classList.add("spinning");
      await cargar();
      setTimeout(() => icon.classList.remove("spinning"), 700);
    };

    // ── Datos ──
    let allObras   = [];
    let allAutores = [];
    let currentTab = "obras";
    let pendingAction = null;

    async function cargar() {
      allObras   = await loadEscritos();
      allAutores = await cargarAutores();
      renderTab();
    }

    async function cargarAutores() {
      try {
        const res  = await fetch(SCRIPT_URL, {
          method:"POST", headers:{"Content-Type":"text/plain"},
          body: JSON.stringify({ action:"getAutores" }),
        });
        const data = await res.json();
        return data.autores || [];
      } catch { return []; }
    }

    // ── Tabs ──
    window.switchTab = function(tab) {
      currentTab = tab;
      ["obras","autores"].forEach((t, i) => {
        document.querySelectorAll(".panel-tab")[i]?.classList.toggle("active", t === tab);
      });
      document.getElementById("searchBar").value = "";
      document.getElementById("filterEstado").value = "";
      renderTab();
    };

    // ── Render ──
    function renderTab() {
      const q   = (document.getElementById("searchBar")?.value   || "").toLowerCase();
      const est = (document.getElementById("filterEstado")?.value || "").toLowerCase();
      const container = document.getElementById("tabContent");

      if (currentTab === "obras") {
        const items = allObras.filter(o => {
          const matchQ   = !q   || o.titulo.toLowerCase().includes(q) || (o.autor||"").toLowerCase().includes(q) || String(o.id).includes(q);
          const matchEst = !est || (o.aprobacion||"pendiente").toLowerCase() === est;
          return matchQ && matchEst;
        });
        if (!items.length) { container.innerHTML = `<div class="empty">No se encontraron obras.</div>`; return; }

        container.innerHTML = items.map(o => {
          const ap = (o.aprobacion || "pendiente").trim().toLowerCase();
          const badgeMap = { aprobado:"badge-aprobado", rechazado:"badge-rechazado", suspension:"badge-suspension", revision:"badge-revision" };
          const bc = badgeMap[ap] || "badge-pendiente";
          const cvHtml = o.cover
            ? `<div class="item-cover"><img src="${o.cover}" alt=""></div>`
            : `<div class="item-cover"></div>`;
          return `
            <div class="item-card">
              ${cvHtml}
              <div class="item-info">
                <h4>${esc(o.titulo)} <span class="badge ${bc}">${ap}</span></h4>
                <small>ID: ${o.id} &nbsp;·&nbsp; ${esc(o.autor||"—")}</small>
                <small>${o.capitulos||0} cap${(o.capitulos||0)!==1?"s":""} &nbsp;·&nbsp; ${(o.estado||"").toUpperCase()}</small>
              </div>
              <div class="item-actions">
                <button class="btn-action approve" onclick="accion('aprobado','obra','${o.id}')">
                  <i class="fas fa-check"></i> Aprobar
                </button>
                <button class="btn-action review"  onclick="accion('revision','obra','${o.id}')">
                  <i class="fas fa-eye"></i> Revisión
                </button>
                <button class="btn-action suspend" onclick="accion('suspension','obra','${o.id}')">
                  <i class="fas fa-ban"></i> Suspender
                </button>
                
              </div>
            </div>`;
        }).join("");

      } else {
        const items = allAutores.filter(a => {
          const matchQ   = !q   || (a.nombre||"").toLowerCase().includes(q) || (a.email||"").toLowerCase().includes(q) || String(a.id_autor).includes(q);
          const matchEst = !est || (a.estado||"activo").toLowerCase() === est;
          return matchQ && matchEst;
        });
        if (!items.length) { container.innerHTML = `<div class="empty">No se encontraron autores.</div>`; return; }

        container.innerHTML = items.map(a => {
          const estado = (a.estado||"activo").toLowerCase();
          const bc     = estado === "suspendido" ? "badge-suspendido" : "badge-activo";
          const avHtml = a.foto
            ? `<div class="persona-av bautor"><img src="${esc(a.foto)}" alt=""></div>`
            : `<div class="persona-av bautor">️</div>`;
          return `
            <div class="item-card">
              ${avHtml}
              <div class="item-info">
                <h4>${esc(a.nombre||"Sin nombre")} <span class="badge ${bc}">${estado}</span></h4>
                <small>ID: ${a.id_autor}</small>
                <small>${esc(a.email||"—")}</small>
              </div>
              <div class="item-actions">
                ${estado === "suspendido"
                  ? `<button class="btn-action approve" onclick="accion('activar','autor','${a.id_autor}')"><i class="fas fa-circle-check"></i> Activar</button>`
                  : `<button class="btn-action suspend" onclick="accion('suspender','autor','${a.id_autor}')"><i class="fas fa-ban"></i> Suspender</button>`}            <a href="edit_autor.html?id=${a.id_autor}" class="btn-action edit" title="Editar perfil">
              <i class="fas fa-pen"></i> Perfil
            </a>
              </div>
            </div>`;
        }).join("");
      }
    }

    window.filtrar = renderTab;

    // ── Modal de acción con motivo ──
    window.accion = function(tipo, targetType, targetId) {
      pendingAction = { tipo, targetType, targetId };
      const labels = {
        aprobado  : "Aprobar obra",
        revision  : "Poner en revisión",
        suspension: "Suspender obra",
        suspender : "Suspender autor",
        activar   : "Activar autor",
      };
      document.getElementById("modalTitulo").textContent = labels[tipo] || tipo;
      document.getElementById("motivoInput").value = "";
      document.getElementById("modalErr").textContent = "";
      document.getElementById("modalOk").textContent  = "";
      document.getElementById("modalOverlay").classList.add("open");
    };

    window.cerrarModal = () => {
      document.getElementById("modalOverlay").classList.remove("open");
      pendingAction = null;
    };

    // Cerrar al clic fuera del box
    document.getElementById("modalOverlay").addEventListener("click", e => {
      if (e.target === document.getElementById("modalOverlay")) cerrarModal();
    });

    // ESC cierra el modal
    document.addEventListener("keydown", e => { if (e.key === "Escape") cerrarModal(); });

    window.confirmarAccion = async () => {
      const motivo  = (document.getElementById("motivoInput")?.value || "").trim();
      const errEl   = document.getElementById("modalErr");
      const okEl    = document.getElementById("modalOk");
      const btnConf = document.getElementById("btnConfirm");

      errEl.textContent = ""; okEl.textContent = "";
      if (!motivo)        { errEl.textContent = "Ingresa un motivo."; return; }
      if (!pendingAction) return;

      btnConf.disabled = true;
      const { tipo, targetType, targetId } = pendingAction;

      try {
        await fetch(SCRIPT_URL, {
          method:"POST", mode:"no-cors",
          body: JSON.stringify({
            action    : targetType === "obra" ? "cambiarAprobacionObra" : "cambiarEstadoAutor",
            idStaff   : modId,
            targetId,
            nuevoEstado: tipo,
            motivo,
          }),
        });
        okEl.textContent = "Acción enviada correctamente.";
        setTimeout(() => { cerrarModal(); cargar(); }, 1300);
      } catch {
        errEl.textContent = "Error de conexión. Intenta de nuevo.";
      } finally {
        btnConf.disabled = false;
      }
    };

    // ── Helper ──
    function esc(s) {
      return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
    }

    cargar();
  </script>
</body>
</html>
