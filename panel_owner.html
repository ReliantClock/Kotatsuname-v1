<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panel Dueño | Kotatsu</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link rel="stylesheet" href="buscador.css">
  <style>
    body{margin:0;background:var(--bg);color:var(--text);font-family:'Rajdhani',sans-serif;}

    /* ── Nav ── */
    .top-nav{
      display:flex;justify-content:space-between;align-items:center;
      padding:12px 20px;border-bottom:1px solid var(--border);
      background:rgba(10,10,15,0.92);backdrop-filter:blur(12px);
      position:sticky;top:0;z-index:50;gap:10px;
    }
    .nav-left{display:flex;align-items:center;gap:10px;flex-shrink:0;}
    .brand{font-family:'Cinzel Decorative';color:var(--accent);font-size:1.1rem;}
    .role-tag{
      font-size:0.6rem;font-weight:700;letter-spacing:0.18em;text-transform:uppercase;
      padding:3px 9px;border-radius:20px;
      border:1px solid var(--accent);color:var(--accent);background:rgba(230,62,109,0.08);
    }
    .nav-right{display:flex;gap:8px;align-items:center;}

    .btn-refresh{
      background:transparent;padding:7px 13px;border-radius:6px;
      color:var(--accent);font-family:'Rajdhani';font-size:0.78rem;font-weight:700;
      border:1px solid var(--accent);transition:all 0.3s;cursor:pointer;white-space:nowrap;
    }
    .btn-refresh:hover{background:var(--accent);color:#fff;box-shadow:0 0 15px rgba(230,62,109,0.4);}
    @keyframes spinOnce{0%{transform:rotate(0)}100%{transform:rotate(360deg)}}
    .spinning{animation:spinOnce 0.6s ease;}

    .logout{background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:1.1rem;transition:0.2s;padding:4px 6px;}
    .logout:hover{color:var(--accent);}

    .container{max-width:1100px;margin:0 auto;padding:24px 16px 100px;}

    /* ── Perfil ── */
    .profile-card{
      display:flex;align-items:center;gap:20px;
      background:var(--surface);border:1px solid rgba(230,62,109,0.3);
      border-radius:18px;padding:20px 24px;margin-bottom:24px;flex-wrap:wrap;
      box-shadow:0 0 30px rgba(230,62,109,0.06);
    }
    .avatar-wrap{position:relative;width:80px;height:80px;flex-shrink:0;}
    .avatar-wrap img{width:100%;height:100%;border-radius:50%;object-fit:cover;border:3px solid var(--accent);background:#1a1a28;display:block;}
    .avatar-btn{
      position:absolute;bottom:2px;right:2px;width:26px;height:26px;border-radius:50%;
      background:var(--accent);border:2px solid var(--surface);color:#fff;
      font-size:0.65rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:0.2s;
    }
    .avatar-btn:hover{transform:scale(1.1);}
    .photo-drawer{
      background:#12121e;border:1px solid var(--border);border-top:none;
      border-radius:0 0 18px 18px;max-height:0;overflow:hidden;
      transition:max-height 0.4s,padding 0.3s,opacity 0.3s;opacity:0;
    }
    .photo-drawer.open{max-height:120px;padding:14px 24px;opacity:1;}
    .photo-row{display:flex;gap:10px;}
    .photo-row input{
      flex:1;min-width:0;background:#0a0a0f;border:1px solid var(--border);padding:10px 13px;
      border-radius:10px;color:#fff;font-family:'Rajdhani';font-size:0.9rem;outline:none;transition:0.2s;
    }
    .photo-row input:focus{border-color:var(--accent);}
    .photo-row button{background:var(--accent);color:#fff;border:none;padding:0 16px;border-radius:10px;font-weight:700;font-family:'Rajdhani';cursor:pointer;font-size:0.85rem;white-space:nowrap;}
    .profile-info .role-label{color:var(--accent);font-size:0.62rem;letter-spacing:3px;font-weight:700;text-transform:uppercase;}
    .profile-info h2{color:#fff;margin:4px 0 0;font-size:1.2rem;}

    /* ── Stats ── */
    .stats-row{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:10px;margin-bottom:24px;}
    .stat-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px;text-align:center;}
    .stat-card .num{font-size:1.7rem;font-weight:700;color:var(--accent);font-family:'Cinzel Decorative';}
    .stat-card .lbl{font-size:0.65rem;color:var(--text-muted);letter-spacing:0.15em;text-transform:uppercase;margin-top:4px;}

    /* ── Tabs ── */
    .panel-tabs{display:flex;margin-bottom:20px;border:1px solid var(--border);border-radius:12px;overflow:hidden;flex-wrap:wrap;}
    .panel-tab{
      flex:1;min-width:60px;padding:10px 6px;background:transparent;border:none;
      color:var(--text-muted);font-family:'Rajdhani';font-size:0.68rem;font-weight:700;
      letter-spacing:0.06em;text-transform:uppercase;cursor:pointer;transition:0.2s;
    }
    .panel-tab.active{background:rgba(230,62,109,0.1);color:var(--accent);border-bottom:2px solid var(--accent);}

    /* ── Filtros ── */
    .filter-row{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;}
    .filter-row input,.filter-row select{
      background:var(--surface);border:1px solid var(--border);
      padding:9px 13px;border-radius:10px;color:#fff;outline:none;
      font-family:'Rajdhani';font-size:0.88rem;transition:0.2s;
    }
    .filter-row input{flex:1;min-width:140px;}
    .filter-row input:focus,.filter-row select:focus{border-color:var(--accent);}
    .filter-row select option{background:#1a1a28;}

    /* ── Cards ── */
    .item-card{
      background:var(--surface);border:1px solid var(--border);
      border-radius:12px;padding:12px 14px;
      display:flex;align-items:center;gap:12px;
      margin-bottom:9px;transition:border-color 0.2s;
    }
    .item-card:hover{border-color:rgba(230,62,109,0.3);}
    .item-cover{
      width:44px;height:62px;border-radius:6px;object-fit:cover;
      border:1px solid var(--border);flex-shrink:0;background:var(--surface2);
      display:flex;align-items:center;justify-content:center;font-size:1.1rem;overflow:hidden;
    }
    .item-cover img{width:100%;height:100%;object-fit:cover;border-radius:5px;}
    /* Avatar circular para personas */
    .persona-avatar{
      width:52px;height:52px;border-radius:50%;object-fit:cover;
      border:2px solid var(--border);flex-shrink:0;background:var(--surface2);
      display:flex;align-items:center;justify-content:center;font-size:1.3rem;overflow:hidden;
    }
    .persona-avatar img{width:100%;height:100%;object-fit:cover;border-radius:50%;}
    .persona-avatar.mod-border  {border-color:#f59e0b;}
    .persona-avatar.admin-border{border-color:var(--accent3);}
    .persona-avatar.autor-border{border-color:#4CAF50;}
    .item-info{flex:1;min-width:0;}
    .item-info h4{margin:0 0 3px;color:#fff;font-size:0.9rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .item-info small{color:var(--text-muted);font-size:0.7rem;}

    .badge{display:inline-block;font-size:0.58rem;font-weight:700;padding:2px 6px;border-radius:9px;margin-left:5px;text-transform:uppercase;}
    .badge-aprobado {color:#4CAF50;background:rgba(76,175,80,0.1); border:1px solid #4CAF50;}
    .badge-pendiente{color:#f59e0b;background:rgba(245,158,11,0.1);border:1px solid #f59e0b;}
    .badge-suspension,.badge-rechazado{color:var(--accent);background:rgba(230,62,109,0.1);border:1px solid var(--accent);}
    .badge-revision  {color:var(--accent3);background:rgba(6,182,212,0.1);border:1px solid var(--accent3);}
    .badge-activo   {color:#4CAF50;background:rgba(76,175,80,0.1);border:1px solid #4CAF50;}
    .badge-suspendido{color:var(--accent);background:rgba(230,62,109,0.1);border:1px solid var(--accent);}
    .badge-mod      {color:#f59e0b;background:rgba(245,158,11,0.08);border:1px solid #f59e0b;}
    .badge-admin    {color:var(--accent3);background:rgba(6,182,212,0.08);border:1px solid var(--accent3);}
    .badge-owner    {color:var(--accent);background:rgba(230,62,109,0.08);border:1px solid var(--accent);}

    .item-actions{display:flex;gap:5px;flex-wrap:wrap;flex-shrink:0;}
    .btn-action{
      background:none;border:1px solid var(--border);color:var(--text-muted);
      padding:5px 9px;border-radius:7px;cursor:pointer;font-family:'Rajdhani';
      font-size:0.68rem;font-weight:700;transition:0.2s;white-space:nowrap;
    }
    .btn-action.approve{border-color:#4CAF50;color:#4CAF50;}
    .btn-action.approve:hover{background:#4CAF50;color:#000;}
    .btn-action.warn{border-color:#f59e0b;color:#f59e0b;}
    .btn-action.warn:hover{background:#f59e0b;color:#000;}
    .btn-action.danger{border-color:var(--accent);color:var(--accent);}
    .btn-action.danger:hover{background:var(--accent);color:#fff;}
    .btn-action.edit{border-color:var(--accent3);color:var(--accent3);}
    .btn-action.edit:hover{background:var(--accent3);color:#000;}
    .btn-action.del{border-color:#ff4444;color:#ff4444;}
    .btn-action.del:hover{background:#ff4444;color:#fff;}
    .btn-action.promote{border-color:#a78bfa;color:#a78bfa;}
    .btn-action.promote:hover{background:#a78bfa;color:#000;}
    .btn-action.demote{border-color:#64748b;color:#64748b;}
    .btn-action.demote:hover{background:#64748b;color:#fff;}

    /* ── Modal ── */
    .overlay{
      position:fixed;inset:0;background:rgba(0,0,0,0.84);
      display:flex;align-items:center;justify-content:center;
      z-index:200;padding:20px;opacity:0;pointer-events:none;transition:opacity 0.3s;
    }
    .overlay.open{opacity:1;pointer-events:all;}
    .modal-box{
      background:#12121e;border:1px solid var(--border);
      border-radius:20px;padding:26px;width:100%;max-width:480px;
      transform:scale(0.95);transition:transform 0.3s;max-height:90vh;overflow-y:auto;
    }
    .overlay.open .modal-box{transform:scale(1);}
    .modal-box h3{font-family:'Cinzel Decorative';color:var(--accent);margin:0 0 16px;font-size:0.95rem;}
    .field{margin-bottom:12px;}
    .field label{display:block;font-size:0.65rem;color:var(--text-muted);font-weight:700;letter-spacing:2px;text-transform:uppercase;margin-bottom:6px;}
    .field input,.field textarea,.field select{
      width:100%;background:#0a0a0f;border:1px solid var(--border);
      padding:10px 12px;border-radius:10px;color:#fff;font-family:'Rajdhani';
      font-size:0.88rem;outline:none;transition:0.2s;box-sizing:border-box;
    }
    .field input:focus,.field textarea:focus,.field select:focus{border-color:var(--accent);}
    .field textarea{resize:vertical;min-height:75px;}
    .field select option{background:#1a1a28;}
    .modal-note{font-size:0.78rem;color:var(--text-muted);margin-bottom:14px;padding:10px;background:rgba(255,255,255,0.03);border-radius:8px;border:1px solid var(--border);}
    .modal-actions{display:flex;gap:10px;margin-top:16px;}
    .btn-m{flex:1;padding:11px;border-radius:10px;border:none;font-family:'Rajdhani';font-weight:700;font-size:0.88rem;cursor:pointer;transition:0.2s;}
    .btn-m.cancel{background:var(--surface);color:var(--text-muted);border:1px solid var(--border);}
    .btn-m.cancel:hover{border-color:var(--accent);color:var(--accent);}
    .btn-m.confirm{background:linear-gradient(135deg,var(--accent),#7c3aed);color:#fff;}
    .btn-m.confirm:hover{filter:brightness(1.1);}
    .btn-m.danger-confirm{background:linear-gradient(135deg,#ff4444,var(--accent));color:#fff;}
    .modal-err{color:var(--accent);font-size:0.82rem;margin-top:8px;min-height:1.1em;text-align:center;}
    .modal-ok {color:#4CAF50;font-size:0.82rem;margin-top:8px;min-height:1.1em;text-align:center;}

    /* ── FAB menú ── */
    .fab-wrap{position:fixed;bottom:24px;right:24px;display:flex;flex-direction:column-reverse;align-items:flex-end;gap:10px;z-index:100;}
    .fab{
      background:linear-gradient(135deg,var(--accent),#7c3aed);
      color:#fff;border:none;border-radius:50px;
      padding:12px 20px;font-family:'Rajdhani';font-weight:700;font-size:0.8rem;
      cursor:pointer;box-shadow:0 6px 20px rgba(230,62,109,0.35);transition:0.2s;
      display:flex;align-items:center;gap:8px;white-space:nowrap;
    }
    .fab:hover{transform:translateY(-2px);filter:brightness(1.1);}
    .fab-menu{display:none;flex-direction:column;gap:8px;align-items:flex-end;}
    .fab-menu.open{display:flex;}
    .fab-sub{
      background:var(--surface);border:1px solid var(--border);
      color:var(--text);border-radius:50px;padding:9px 16px;
      font-family:'Rajdhani';font-weight:700;font-size:0.75rem;
      cursor:pointer;transition:0.2s;white-space:nowrap;
      box-shadow:0 4px 14px rgba(0,0,0,0.3);
    }
    .fab-sub:hover{border-color:var(--accent);color:var(--accent);}

    .empty{text-align:center;padding:45px 20px;color:var(--text-muted);border:1px dashed var(--border);border-radius:12px;}

    @media(max-width:600px){
      .item-actions{width:100%;justify-content:flex-end;}
      .item-card{flex-wrap:wrap;}
      .stats-row{grid-template-columns:repeat(2,1fr);}
    }
  </style>
</head>
<body>
  <div class="bg-grid"></div>

  <nav class="top-nav">
    <div class="nav-left">
      <span class="brand">KOTATSUNAME</span>
      <span class="role-tag">Dueño</span>
    </div>
    <div class="nav-right">
      <button class="btn-refresh" id="btnRefresh" onclick="refrescar()" title="Actualizar">
        <i class="fas fa-rotate-right" id="refreshIcon"></i>
      </button>
      <button class="logout" onclick="cerrarSesion()" title="Cerrar sesión">
        <i class="fas fa-power-off"></i>
      </button>
    </div>
  </nav>

  <main class="container">
    <!-- Perfil -->
    <div style="margin-bottom:20px;">
      <div class="profile-card">
        <div class="avatar-wrap">
          <img id="ownerAvatar"
            src="data:image/svg+xml,<svg viewBox='0 0 1 1' fill='%231a1a28' xmlns='http://www.w3.org/2000/svg'><rect width='1' height='1'/></svg>"
            alt="Avatar" />
          <button class="avatar-btn" onclick="togglePhotoDrawer()"><i class="fas fa-camera"></i></button>
        </div>
        <div class="profile-info">
          <p class="role-label"></p>
          <h2 id="ownerName">Dueño</h2>
          <p style="color:var(--text-muted);font-size:0.72rem;" id="ownerEmail"></p>
        </div>
      </div>
      <div class="photo-drawer" id="photoDrawer">
        <div class="photo-row">
          <input type="text" id="driveInput" placeholder="Link de Google Drive para la foto..." />
          <button onclick="guardarFoto()">Actualizar</button>
        </div>
      </div>
    </div>

    <!-- Stats -->
    <div class="stats-row">
      <div class="stat-card"><div class="num" id="statObras">-</div><div class="lbl">Obras</div></div>
      <div class="stat-card"><div class="num" id="statAutores">-</div><div class="lbl">Autores</div></div>
      <div class="stat-card"><div class="num" id="statMods">-</div><div class="lbl">Mods</div></div>
      <div class="stat-card"><div class="num" id="statAdmins">-</div><div class="lbl">Admins</div></div>
    </div>

    <!-- Tabs -->
    <div class="panel-tabs">
      <button class="panel-tab active" onclick="switchTab('obras')">Obras</button>
      <button class="panel-tab" onclick="switchTab('autores')">Autores</button>
      <button class="panel-tab" onclick="switchTab('moderadores')">Mods</button>
      <button class="panel-tab" onclick="switchTab('admins')">Admins</button>
    </div>

    <!-- Filtros -->
    <div class="filter-row">
      <input type="text" id="searchBar" placeholder="Buscar por título, nombre, ID..." oninput="filtrar()" />
      <select id="filterEstado" onchange="filtrar()">
        <option value="">Todos los estados</option>
        <option value="aprobado">Aprobado</option>
        <option value="pendiente">Pendiente</option>
        <option value="suspension">Suspendido</option>
        <option value="revision">En revisión</option>
        <option value="activo">Activo</option>
        <option value="suspendido">Suspendido (persona)</option>
      </select>
    </div>

    <div id="tabContent">
      <div class="empty"><i class="fas fa-spinner fa-spin"></i>&nbsp; Cargando...</div>
    </div>
  </main>

  <!-- FAB con submenú -->
  <div class="fab-wrap">
    <div class="fab-menu" id="fabMenu">
      <button class="fab-sub" onclick="abrirCrear('mod')">+ Nuevo Moderador</button>
      <button class="fab-sub" onclick="abrirCrear('admin')">+ Nuevo Admin</button>
      <button class="fab-sub" onclick="abrirCrear('user')">+ Nuevo Usuario</button>
    </div>
    <button class="fab" onclick="toggleFabMenu()">
      <i class="fas fa-plus" id="fabIcon"></i> Crear
    </button>
  </div>

  <!-- Modal -->
  <div class="overlay" id="modalOverlay">
    <div class="modal-box">
      <h3 id="modalTitulo">Acción</h3>
      <div id="modalBody"></div>
      <div class="modal-err" id="modalErr"></div>
      <div class="modal-ok"  id="modalOk"></div>
      <div class="modal-actions">
        <button class="btn-m cancel" onclick="cerrarModal()">Cancelar</button>
        <button class="btn-m confirm" id="btnConfirm" onclick="confirmar()">Confirmar</button>
      </div>
    </div>
  </div>

  <script type="module">
    import { requireRole, clearSession } from "./staff_auth.js";
    import { loadEscritos, clearCache } from "./escritos_data.js";

    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxlwm_htimcLqGW7p5HQvdgqwY1V7tlr3oEt5vl6FMZ8j6TGyB3V8t4Dwd2t8vU9AZA/exec";

    requireRole(["owner"]);

    const ownerId    = localStorage.getItem("ktt_id")    || "";
    const ownerEmail = localStorage.getItem("ktt_email") || "";
    const ownerName  = localStorage.getItem("ktt_user")  || "Dueño";
    const ownerFoto  = localStorage.getItem("ktt_foto")  || "";

    document.getElementById("ownerName").textContent  = ownerName;
    document.getElementById("ownerEmail").textContent = ownerEmail;
    if (ownerFoto) document.getElementById("ownerAvatar").src = ownerFoto;

    window.cerrarSesion = () => { clearSession(); window.location.href = "registrarse.html"; };

    // ── Foto propia ──
    window.togglePhotoDrawer = () => document.getElementById("photoDrawer").classList.toggle("open");
    window.guardarFoto = async () => {
      const val = document.getElementById("driveInput").value.trim();
      if (!val) return;
      const match = val.match(/[-\w]{25,}/);
      if (!match) { alert("Link inválido."); return; }
      const url = `https://wsrv.nl/?url=${encodeURIComponent(`https://drive.google.com/uc?export=view&id=${match[0]}`)}&w=300&output=webp`;
      document.getElementById("ownerAvatar").src = url;
      localStorage.setItem("ktt_foto", url);
      document.getElementById("photoDrawer").classList.remove("open");
      await fetch(SCRIPT_URL, { method:"POST", mode:"no-cors",
        body: JSON.stringify({ action:"actualizarFotoStaff", idStaff: ownerId, foto: url }),
      });
    };

    // ── FAB submenú ──
    window.toggleFabMenu = () => {
      const m = document.getElementById("fabMenu");
      const i = document.getElementById("fabIcon");
      const open = m.classList.toggle("open");
      i.className = open ? "fas fa-xmark" : "fas fa-plus";
    };
    document.addEventListener("click", e => {
      const wrap = document.querySelector(".fab-wrap");
      if (!wrap.contains(e.target)) {
        document.getElementById("fabMenu").classList.remove("open");
        document.getElementById("fabIcon").className = "fas fa-plus";
      }
    });

    // ── Estado global ──
    let allObras=[], allAutores=[], allMods=[], allAdmins=[];
    let currentTab = "obras";
    let pendingAction = null;

    // ── Cargar datos ──
    async function cargar() {
      try {
        const [obras, staffData] = await Promise.all([
          loadEscritos(),
          fetch(SCRIPT_URL, {
            method:"POST", headers:{"Content-Type":"text/plain"},
            body: JSON.stringify({ action:"getStaffList", rolReq:"owner", idOwner: ownerId }),
          }).then(r => r.json()).catch(() => ({})),
        ]);
        allObras   = obras;
        allAutores = staffData.autores     || [];
        allMods    = staffData.moderadores || [];
        allAdmins  = staffData.admins      || [];
      } catch(e) {
        console.error(e);
      }
      document.getElementById("statObras").textContent   = allObras.length;
      document.getElementById("statAutores").textContent = allAutores.length;
      document.getElementById("statMods").textContent    = allMods.length;
      document.getElementById("statAdmins").textContent  = allAdmins.length;
      renderTab();
    }

    // ── Refrescar ──
    window.refrescar = async () => {
      const icon = document.getElementById("refreshIcon");
      icon.classList.add("spinning");
      clearCache();
      await cargar();
      setTimeout(() => icon.classList.remove("spinning"), 700);
    };

    // ── Tabs ──
    const TAB_KEYS = ["obras","autores","moderadores","admins"];
    window.switchTab = function(tab) {
      currentTab = tab;
      document.querySelectorAll(".panel-tab").forEach((t,i) =>
        t.classList.toggle("active", TAB_KEYS[i] === tab));
      document.getElementById("searchBar").value = "";
      document.getElementById("filterEstado").value = "";
      renderTab();
    };

    window.filtrar = renderTab;

    // ── Render ──
    function renderTab() {
      const q   = (document.getElementById("searchBar")?.value || "").toLowerCase();
      const est = document.getElementById("filterEstado")?.value || "";
      const c   = document.getElementById("tabContent");

      if (currentTab === "obras") {
        const items = allObras.filter(o => {
          if (q && !o.titulo.toLowerCase().includes(q) && !o.autor.toLowerCase().includes(q) && !String(o.id).includes(q)) return false;
          if (est && (o.aprobacion||"pendiente").toLowerCase() !== est) return false;
          return true;
        });
        if (!items.length) { c.innerHTML = `<div class="empty">Sin resultados.</div>`; return; }
        c.innerHTML = items.map(o => {
          const ap = (o.aprobacion || "pendiente").toLowerCase();
          const bc = { aprobado:"badge-aprobado", suspension:"badge-suspension", rechazado:"badge-rechazado", revision:"badge-revision" }[ap] || "badge-pendiente";
          const cv = o.cover
            ? `<div class="item-cover"><img src="${o.cover}" alt="" onerror="this.parentElement.textContent=''"></div>`
            : `<div class="item-cover"></div>`;
          return `<div class="item-card">${cv}
            <div class="item-info">
              <h4>${o.titulo} <span class="badge ${bc}">${ap}</span></h4>
              <small>ID: ${o.id} · ${o.autor} · ${o.capitulos} caps</small>
            </div>
            <div class="item-actions">
              <button class="btn-action approve" onclick='accion("aprobado","obra","${o.id}")'>Aprobar</button>
              <button class="btn-action warn"    onclick='accion("revision","obra","${o.id}")'>Revisión</button>
              <button class="btn-action edit"    onclick='abrirEditarObra(${JSON.stringify(o)})'>Editar</button>
              <button class="btn-action danger"  onclick='accion("suspension","obra","${o.id}")'>Suspender</button>
              <button class="btn-action del"     onclick='accionEliminar("${o.id}","${encodeURIComponent(o.titulo)}")'>Eliminar</button>
            </div>
          </div>`;
        }).join("");

      } else if (currentTab === "autores") {
        const items = allAutores.filter(a => !q || (a.nombre||"").toLowerCase().includes(q) || String(a.id_autor).includes(q));
        if (!items.length) { c.innerHTML = `<div class="empty">Sin autores.</div>`; return; }
        c.innerHTML = items.map(a => {
          const e2  = (a.estado||"activo").toLowerCase();
          const bc  = e2 === "suspendido" ? "badge-suspendido" : "badge-activo";
          const av  = a.foto
            ? `<div class="persona-avatar autor-border"><img src="${a.foto}" alt="${a.nombre}" onerror="this.parentElement.textContent='👤'"></div>`
            : `<div class="persona-avatar autor-border">👤</div>`;
          const obras = a.total_obras || 0;
          return `<div class="item-card">${av}
            <div class="item-info">
              <h4>${a.nombre} <span class="badge ${bc}">${e2}</span></h4>
              <small>ID: ${a.id_autor} · ${a.email||""}</small>
              <small style="color:var(--accent3);margin-top:2px;display:block;"> ${obras} obra${obras!==1?"s":""}</small>
            </div>
            <div class="item-actions">
              ${e2==="suspendido"
                ? `<button class="btn-action approve" onclick='accion("activar","autor","${a.id_autor}")'>Activar</button>`
                : `<button class="btn-action danger"  onclick='accion("suspender","autor","${a.id_autor}")'>Suspender</button>`}
              <button class="btn-action edit" onclick='accionFoto("autor","${a.id_autor}","${encodeURIComponent(a.nombre)}")'>Foto</button>
              <button class="btn-action promote" onclick='accionPromover("autor","${a.id_autor}","${encodeURIComponent(a.nombre)}")'>Promover</button>
            </div>
          </div>`;
        }).join("");

      } else if (currentTab === "moderadores") {
        const items = allMods.filter(m => !q || (m.nombre||"").toLowerCase().includes(q) || String(m.id_staff).includes(q));
        if (!items.length) { c.innerHTML = `<div class="empty">Sin moderadores.</div>`; return; }
        c.innerHTML = items.map(m => {
          const e2 = (m.estado||"activo").toLowerCase();
          const bc = e2 === "suspendido" ? "badge-suspendido" : "badge-mod";
          const av = m.foto
            ? `<div class="persona-avatar mod-border"><img src="${m.foto}" alt="${m.nombre}" onerror="this.parentElement.textContent='🛡'"></div>`
            : `<div class="persona-avatar mod-border">👤</div>`;
          return `<div class="item-card">${av}
            <div class="item-info">
              <h4>${m.nombre} <span class="badge ${bc}"> ${e2}</span></h4>
              <small>ID: ${m.id_staff} · ${m.email||""}</small>
            </div>
            <div class="item-actions">
              ${e2==="suspendido"
                ? `<button class="btn-action approve" onclick='accion("activar","mod","${m.id_staff}")'>Activar</button>`
                : `<button class="btn-action danger"  onclick='accion("suspender","mod","${m.id_staff}")'>Suspender</button>`}
              <button class="btn-action edit"    onclick='accionFoto("mod","${m.id_staff}","${encodeURIComponent(m.nombre)}")'>Foto</button>
              <button class="btn-action promote" onclick='accionPromover("mod","${m.id_staff}","${encodeURIComponent(m.nombre)}")'>↑ Admin</button>
              <button class="btn-action demote"  onclick='accionDegrader("mod","${m.id_staff}","${encodeURIComponent(m.nombre)}")'>↓ Degradar</button>
            </div>
          </div>`;
        }).join("");

      } else {
        const items = allAdmins.filter(a => !q || (a.nombre||"").toLowerCase().includes(q) || String(a.id_staff).includes(q));
        if (!items.length) { c.innerHTML = `<div class="empty">Sin admins.</div>`; return; }
        c.innerHTML = items.map(a => {
          const e2 = (a.estado||"activo").toLowerCase();
          const bc = e2 === "suspendido" ? "badge-suspendido" : "badge-admin";
          const av = a.foto
            ? `<div class="persona-avatar admin-border"><img src="${a.foto}" alt="${a.nombre}" onerror="this.parentElement.textContent='⚙'"></div>`
            : `<div class="persona-avatar admin-border">👤</div>`;
          return `<div class="item-card">${av}
            <div class="item-info">
              <h4>${a.nombre} <span class="badge ${bc}"> ${e2}</span></h4>
              <small>ID: ${a.id_staff} · ${a.email||""}</small>
            </div>
            <div class="item-actions">
              ${e2==="suspendido"
                ? `<button class="btn-action approve" onclick='accion("activar","admin","${a.id_staff}")'>Activar</button>`
                : `<button class="btn-action danger"  onclick='accion("suspender","admin","${a.id_staff}")'>Suspender</button>`}
              <button class="btn-action edit"   onclick='accionFoto("admin","${a.id_staff}","${encodeURIComponent(a.nombre)}")'>Foto</button>
              <button class="btn-action demote" onclick='accionDegrader("admin","${a.id_staff}","${encodeURIComponent(a.nombre)}")'>↓ Degradar a Mod</button>
            </div>
          </div>`;
        }).join("");
      }
    }

    // ── Abrir modal genérico con motivo ──
    window.accion = function(tipo, targetType, targetId) {
      pendingAction = { mode:"action", tipo, targetType, targetId };
      const labels = { aprobado:"Aprobar obra", revision:"Poner en revisión", suspension:"Suspender", suspender:"Suspender persona", activar:"Activar persona", eliminar:"Eliminar" };
      document.getElementById("modalTitulo").textContent = labels[tipo] || tipo;
      document.getElementById("modalBody").innerHTML = `
        <div class="field"><label>Motivo</label>
          <textarea id="motivoInput" placeholder="Describe el motivo de esta acción..."></textarea>
        </div>`;
      document.getElementById("btnConfirm").className = tipo==="eliminar" ? "btn-m danger-confirm" : "btn-m confirm";
      document.getElementById("modalErr").textContent = "";
      document.getElementById("modalOk").textContent  = "";
      document.getElementById("modalOverlay").classList.add("open");
    };

    // ── Editar obra ──
    window.abrirEditarObra = function(o) {
      pendingAction = { mode:"editarObra", idObra: o.id };
      document.getElementById("modalTitulo").textContent = "Editar Obra";
      document.getElementById("modalBody").innerHTML = `
        <div class="field"><label>Título</label><input id="editTitulo" value="${(o.titulo||"").replace(/"/g,'&quot;')}"></div>
        <div class="field"><label>Portada (link Drive o ID)</label><input id="editCover" value="${(o.raw_cover||"").replace(/"/g,'&quot;')}"></div>
        <div class="field"><label>Sinopsis</label><textarea id="editSinopsis">${o.sinopsis||""}</textarea></div>
        <div class="field"><label>Estado de aprobación</label>
          <select id="editAprobacion">
            <option value="aprobado" ${(o.aprobacion||"")==="aprobado"?"selected":""}>Aprobado</option>
            <option value="pendiente" ${(o.aprobacion||"")==="pendiente"?"selected":""}>Pendiente</option>
            <option value="suspension" ${(o.aprobacion||"")==="suspension"?"selected":""}>Suspendido</option>
            <option value="revision" ${(o.aprobacion||"")==="revision"?"selected":""}>En revisión</option>
          </select>
        </div>`;
      document.getElementById("btnConfirm").className = "btn-m confirm";
      document.getElementById("modalErr").textContent = "";
      document.getElementById("modalOk").textContent  = "";
      document.getElementById("modalOverlay").classList.add("open");
    };

    // ── Eliminar obra ──
    window.accionEliminar = function(targetId, titulo) {
      pendingAction = { mode:"eliminar", targetId };
      document.getElementById("modalTitulo").textContent = `Eliminar: ${decodeURIComponent(titulo)}`;
      document.getElementById("modalBody").innerHTML = `
        <p class="modal-note" style="color:var(--accent);">⚠ Esta acción es irreversible y borrará todos los capítulos.</p>
        <div class="field"><label>Motivo</label>
          <textarea id="motivoInput" placeholder="¿Por qué eliminas esta obra?"></textarea>
        </div>`;
      document.getElementById("btnConfirm").className = "btn-m danger-confirm";
      document.getElementById("modalErr").textContent = "";
      document.getElementById("modalOk").textContent  = "";
      document.getElementById("modalOverlay").classList.add("open");
    };

    // ── Cambiar foto ──
    window.accionFoto = function(targetType, targetId, nombre) {
      pendingAction = { mode:"foto", targetType, targetId };
      document.getElementById("modalTitulo").textContent = `Cambiar foto — ${decodeURIComponent(nombre)}`;
      document.getElementById("modalBody").innerHTML = `
        <div class="field"><label>Link de imagen (Google Drive)</label>
          <input type="text" id="nuevaFotoInput" placeholder="https://drive.google.com/file/d/...">
        </div>`;
      document.getElementById("btnConfirm").className = "btn-m confirm";
      document.getElementById("modalErr").textContent = "";
      document.getElementById("modalOk").textContent  = "";
      document.getElementById("modalOverlay").classList.add("open");
    };

    // ── Promover persona ──
    window.accionPromover = function(currentRole, targetId, nombre) {
      // autor → mod, mod → admin
      const nuevoRol = currentRole === "autor" ? "mod" : "admin";
      const label    = currentRole === "autor" ? "Promover a Moderador" : "Promover a Administrador";
      pendingAction  = { mode:"cambiarRol", targetType: currentRole, targetId, nuevoRol };
      document.getElementById("modalTitulo").textContent = `${label} — ${decodeURIComponent(nombre)}`;
      document.getElementById("modalBody").innerHTML = `
        <p class="modal-note">Esta persona pasará a ser <strong>${nuevoRol === "mod" ? "Moderador" : "Administrador"}</strong>.
        Se creará una cuenta en la hoja Staff con el email que indiques.</p>
        ${currentRole === "autor" ? `
        <div class="field"><label>Email Staff (${nuevoRol==="mod"?"@kots-stf-mod.com":"@kots-stf-adm.com"})</label>
          <input type="email" id="promEmail" placeholder="${nuevoRol==="mod"?"nombre@kots-stf-mod.com":"nombre@kots-stf-adm.com"}">
        </div>
        <div class="field"><label>Contraseña</label>
          <input type="password" id="promPass" placeholder="Contraseña del nuevo staff">
        </div>` : `<p class="modal-note" style="color:var(--accent3);">Se cambiará el rol en la tabla Staff.</p>`}
        <div class="field"><label>Motivo (opcional)</label>
          <input type="text" id="motivoInput" placeholder="Razón del ascenso...">
        </div>`;
      document.getElementById("btnConfirm").className = "btn-m confirm";
      document.getElementById("modalErr").textContent = "";
      document.getElementById("modalOk").textContent  = "";
      document.getElementById("modalOverlay").classList.add("open");
    };

    // ── Degradar persona ──
    window.accionDegrader = function(currentRole, targetId, nombre) {
      const nuevoRol = currentRole === "admin" ? "mod" : "user";
      const label    = currentRole === "admin" ? "Degradar a Moderador" : "Degradar a Usuario";
      pendingAction  = { mode:"cambiarRol", targetType: currentRole, targetId, nuevoRol };
      document.getElementById("modalTitulo").textContent = `${label} — ${decodeURIComponent(nombre)}`;
      document.getElementById("modalBody").innerHTML = `
        <p class="modal-note" style="color:#f59e0b;">Esta persona perderá su rol de ${currentRole === "admin" ? "Admin" : "Mod"}.</p>
        <div class="field"><label>Motivo</label>
          <textarea id="motivoInput" placeholder="Razón del cambio de rol..."></textarea>
        </div>`;
      document.getElementById("btnConfirm").className = "btn-m danger-confirm";
      document.getElementById("modalErr").textContent = "";
      document.getElementById("modalOk").textContent  = "";
      document.getElementById("modalOverlay").classList.add("open");
    };

    // ── Crear nuevo staff/usuario ──
    window.abrirCrear = function(tipo) {
      document.getElementById("fabMenu").classList.remove("open");
      document.getElementById("fabIcon").className = "fas fa-plus";

      const dominios = { mod:"@kots-stf-mod.com", admin:"@kots-stf-adm.com", user:"@gmail.com" };
      const titulos  = { mod:"Nuevo Moderador", admin:"Nuevo Administrador", user:"Nuevo Usuario" };
      pendingAction  = { mode:"crear", tipo };

      document.getElementById("modalTitulo").textContent = titulos[tipo];
      document.getElementById("modalBody").innerHTML = `
        <div class="field"><label>Nombre</label>
          <input type="text" id="newNombre" placeholder="Nombre completo">
        </div>
        <div class="field"><label>Correo (${dominios[tipo]})</label>
          <input type="email" id="newEmail" placeholder="${tipo==="user"?"usuario@gmail.com":`nombre${dominios[tipo]}`}">
        </div>
        <div class="field"><label>Contraseña</label>
          <input type="password" id="newPass" placeholder="Contraseña">
        </div>`;
      document.getElementById("btnConfirm").className = "btn-m confirm";
      document.getElementById("modalErr").textContent = "";
      document.getElementById("modalOk").textContent  = "";
      document.getElementById("modalOverlay").classList.add("open");
    };

    window.cerrarModal = () => {
      document.getElementById("modalOverlay").classList.remove("open");
      pendingAction = null;
    };
    document.getElementById("modalOverlay").addEventListener("click", e => {
      if (e.target === document.getElementById("modalOverlay")) cerrarModal();
    });

    // ── Confirmar acción ──
    window.confirmar = async () => {
      if (!pendingAction) return;
      const pa     = pendingAction;
      const errEl  = document.getElementById("modalErr");
      const okEl   = document.getElementById("modalOk");
      const btn    = document.getElementById("btnConfirm");

      errEl.textContent = "";
      okEl.textContent  = "";
      btn.disabled = true;

      try {
        // ── Crear usuario/staff ──
        if (pa.mode === "crear") {
          const nombre = document.getElementById("newNombre")?.value.trim();
          const email  = document.getElementById("newEmail")?.value.trim();
          const pass   = document.getElementById("newPass")?.value.trim();
          if (!nombre || !email || !pass) { errEl.textContent = "Completa todos los campos."; return; }

          const dominios = { mod:"@kots-stf-mod.com", admin:"@kots-stf-adm.com", user:"@gmail.com" };
          if (!email.endsWith(dominios[pa.tipo])) {
            errEl.textContent = `El correo debe terminar en ${dominios[pa.tipo]}`; return;
          }
          const action = pa.tipo === "user" ? "registro" : "crearStaff";
          await fetch(SCRIPT_URL, { method:"POST", mode:"no-cors",
            body: JSON.stringify({ action, rol: pa.tipo, nombre, email, pass, idOwner: ownerId }),
          });
          okEl.textContent = "¡Creado correctamente!";

        // ── Editar obra ──
        } else if (pa.mode === "editarObra") {
          const titulo     = document.getElementById("editTitulo")?.value.trim();
          const cover      = document.getElementById("editCover")?.value.trim();
          const sinopsis   = document.getElementById("editSinopsis")?.value.trim();
          const aprobacion = document.getElementById("editAprobacion")?.value;
          if (!titulo) { errEl.textContent = "El título no puede estar vacío."; return; }
          await fetch(SCRIPT_URL, { method:"POST", mode:"no-cors",
            body: JSON.stringify({ action:"editarObraOwner", idOwner: ownerId, idObra: pa.idObra, titulo, cover, sinopsis, aprobacion }),
          });
          okEl.textContent = "¡Obra actualizada!";

        // ── Eliminar obra ──
        } else if (pa.mode === "eliminar") {
          const motivo = document.getElementById("motivoInput")?.value.trim();
          if (!motivo) { errEl.textContent = "El motivo es obligatorio."; return; }
          await fetch(SCRIPT_URL, { method:"POST", mode:"no-cors",
            body: JSON.stringify({ action:"eliminarObra", idOwner: ownerId, targetId: pa.targetId, motivo }),
          });
          okEl.textContent = "Obra eliminada.";

        // ── Cambiar foto ──
        } else if (pa.mode === "foto") {
          const val = document.getElementById("nuevaFotoInput")?.value.trim();
          if (!val) { errEl.textContent = "Ingresa un link de imagen."; return; }
          const match = val.match(/[-\w]{25,}/);
          const url = match
            ? `https://wsrv.nl/?url=${encodeURIComponent(`https://drive.google.com/uc?export=view&id=${match[0]}`)}&w=300&output=webp`
            : val;
          await fetch(SCRIPT_URL, { method:"POST", mode:"no-cors",
            body: JSON.stringify({ action:"cambiarFotoPersona", targetType: pa.targetType, targetId: pa.targetId, foto: url, idOwner: ownerId }),
          });
          okEl.textContent = "¡Foto actualizada!";

        // ── Cambiar rol (promover / degradar) ──
        } else if (pa.mode === "cambiarRol") {
          const motivo = document.getElementById("motivoInput")?.value.trim() || "";
          const email  = document.getElementById("promEmail")?.value.trim() || "";
          const pass   = document.getElementById("promPass")?.value.trim()  || "";
          await fetch(SCRIPT_URL, { method:"POST", mode:"no-cors",
            body: JSON.stringify({
              action:"cambiarRolPersona", idOwner: ownerId,
              targetType: pa.targetType, targetId: pa.targetId,
              nuevoRol: pa.nuevoRol, motivo, email, pass,
            }),
          });
          okEl.textContent = "¡Rol actualizado!";

        // ── Acción general (suspender, activar, aprobar, etc.) ──
        } else {
          const motivo = document.getElementById("motivoInput")?.value.trim();
          if (!motivo) { errEl.textContent = "El motivo es obligatorio."; return; }
          const actionName = pa.targetType === "obra" ? "cambiarAprobacionObra" : "cambiarEstadoPersona";
          await fetch(SCRIPT_URL, { method:"POST", mode:"no-cors",
            body: JSON.stringify({
              action: actionName, idOwner: ownerId,
              targetType: pa.targetType, targetId: pa.targetId,
              nuevoEstado: pa.tipo, motivo,
            }),
          });
          okEl.textContent = "¡Acción aplicada!";
        }

        setTimeout(() => { cerrarModal(); clearCache(); cargar(); }, 1000);

      } catch(e) {
        errEl.textContent = "Error de conexión: " + e.message;
      } finally {
        btn.disabled = false;
      }
    };

    cargar();
  </script>
</body>
</html>
