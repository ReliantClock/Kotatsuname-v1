<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panel de Autor | Kotatsu</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link rel="stylesheet" href="buscador.css">
  <style>
    body { margin:0; background:var(--bg); color:var(--text); font-family:'Rajdhani',sans-serif; }

    /* ── Nav ── */
    .top-nav {
      display:flex; justify-content:space-between; align-items:center;
      padding:12px 20px; border-bottom:1px solid var(--border);
      background:rgba(10,10,15,0.9); backdrop-filter:blur(12px);
      position:sticky; top:0; z-index:50; gap:10px;
    }
    .top-nav .brand { font-family:'Cinzel Decorative'; color:var(--accent); font-size:1.2rem; flex-shrink:0; }
    .top-nav .nav-links { display:flex; gap:8px; align-items:center; }

    .btn-home {
      text-decoration:none; background:transparent; padding:7px 14px;
      border-radius:6px; color:var(--text-muted); font-family:'Rajdhani';
      font-size:0.78rem; font-weight:700; letter-spacing:0.08em;
      border:1px solid var(--border); transition:0.2s; white-space:nowrap;
    }
    .btn-home:hover { border-color:var(--accent3); color:var(--accent3); }

    .btn-refresh {
      background:transparent; padding:7px 13px; border-radius:6px;
      color:var(--accent); font-family:'Rajdhani'; font-size:0.78rem; font-weight:700;
      border:1px solid var(--accent); transition:all 0.3s; cursor:pointer; white-space:nowrap;
    }
    .btn-refresh:hover { background:var(--accent); color:#fff; box-shadow:0 0 15px rgba(230,62,109,0.4); }

    .logout {
      background:none; border:none; color:var(--text-muted);
      cursor:pointer; font-size:1.1rem; transition:color 0.2s; padding:4px 6px;
    }
    .logout:hover { color:var(--accent); }

    /* Animación del icono de refresh */
    @keyframes spinOnce { 0%{transform:rotate(0)} 100%{transform:rotate(360deg)} }
    .spinning { animation:spinOnce 0.6s ease; }

    /* ── Layout ── */
    .container { max-width:900px; margin:0 auto; padding:24px 16px 80px; }

    /* ── Perfil ── */
    .profile-card {
      display:flex; align-items:center; gap:20px;
      background:var(--surface); border:1px solid var(--border);
      border-radius:20px; padding:20px 24px;
      box-shadow:0 8px 30px rgba(0,0,0,0.3); flex-wrap:wrap;
    }
    .avatar-wrap { position:relative; width:90px; height:90px; flex-shrink:0; }
    .avatar-wrap img {
      width:100%; height:100%; border-radius:50%;
      object-fit:cover; border:3px solid var(--accent3);
      background:#1a1a28; display:block;
    }
    .avatar-btn {
      position:absolute; bottom:1px; right:1px;
      width:26px; height:26px; border-radius:50%;
      background:var(--accent); border:2px solid var(--surface);
      color:#fff; font-size:0.65rem; cursor:pointer;
      display:flex; align-items:center; justify-content:center; transition:0.2s;
    }
    .avatar-btn:hover { transform:scale(1.1); }
    .profile-info { flex:1; min-width:0; }
    .profile-info .role { color:var(--accent3); font-size:0.62rem; letter-spacing:3px; font-weight:700; text-transform:uppercase; }
    .profile-info h2   { color:#fff; margin:4px 0 0; font-size:1.3rem; }
    .profile-info .pid { color:var(--text-muted); font-size:0.68rem; margin-top:4px; font-family:monospace; word-break:break-all; }

    /* ── Drawer foto ── */
    .photo-drawer {
      background:#12121e; border:1px solid var(--border); border-top:none;
      border-radius:0 0 20px 20px; max-height:0; overflow:hidden;
      transition:max-height 0.4s,padding 0.3s,opacity 0.3s; opacity:0;
    }
    .photo-drawer.open { max-height:140px; padding:16px 24px; opacity:1; }
    .photo-drawer label {
      font-size:0.68rem; color:var(--text-muted); font-weight:700;
      letter-spacing:2px; text-transform:uppercase; display:block; margin-bottom:8px;
    }
    .photo-row { display:flex; gap:8px; }
    .photo-row input {
      flex:1; min-width:0; background:#0a0a0f; border:1px solid var(--border);
      padding:10px 12px; border-radius:10px; color:#fff; outline:none;
      font-family:'Rajdhani'; font-size:0.9rem; transition:0.2s;
    }
    .photo-row input:focus { border-color:var(--accent3); }
    .photo-row button {
      background:var(--accent3); color:#000; border:none;
      padding:0 16px; border-radius:10px; font-weight:700;
      font-family:'Rajdhani'; cursor:pointer; font-size:0.85rem; white-space:nowrap;
    }

    /* ── Banner suspensión ── */
    .susp-banner {
      background:rgba(255,68,68,0.08); border:1px solid #ff4444;
      border-radius:12px; padding:12px 16px; margin-bottom:18px;
      font-size:0.85rem; color:#ff4444; display:none;
    }
    .susp-banner strong { display:block; margin-bottom:3px; }

    /* ── Cabecera obras ── */
    .obras-header {
      display:flex; justify-content:space-between; align-items:center;
      margin:24px 0 16px; flex-wrap:wrap; gap:10px;
    }
    .obras-header h3 {
      font-family:'Cinzel Decorative'; font-size:0.82rem;
      letter-spacing:1px; color:var(--text-muted); margin:0;
    }
    .btn-nueva {
      background:var(--accent); color:#fff; text-decoration:none;
      padding:9px 20px; border-radius:50px; font-weight:700;
      font-size:0.75rem; box-shadow:0 4px 15px rgba(230,62,109,0.3); transition:0.2s;
    }
    .btn-nueva:hover { filter:brightness(1.1); transform:translateY(-1px); }

    /* ── Obra card CON portada ── */
    .obra-card {
      background:var(--surface); border:1px solid var(--border);
      border-radius:14px; padding:12px 14px;
      display:flex; align-items:center; gap:14px;
      margin-bottom:12px; transition:border-color 0.2s;
    }
    .obra-card:hover { border-color:rgba(230,62,109,0.35); }

    .obra-cover-mini {
      width:52px; height:72px; border-radius:7px;
      object-fit:cover; border:1px solid var(--border);
      flex-shrink:0; background:var(--surface2);
    }
    .obra-cover-ph {
      width:52px; height:72px; border-radius:7px;
      background:var(--surface2); border:1px solid var(--border);
      flex-shrink:0; display:flex; align-items:center;
      justify-content:center; font-size:1.4rem;
    }

    .obra-info { flex:1; min-width:0; }
    .obra-info h4 {
      margin:0 0 5px; color:#fff; font-size:0.93rem;
      white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
    }
    .obra-info small { color:var(--text-muted); font-size:0.72rem; font-weight:600; display:block; }

    .badge {
      display:inline-block; font-size:0.58rem; font-weight:700;
      padding:2px 7px; border-radius:10px; margin-left:6px; text-transform:uppercase;
    }
    .badge-aprobado  { color:#4CAF50; background:rgba(76,175,80,0.12);   border:1px solid #4CAF50; }
    .badge-pendiente { color:#f59e0b; background:rgba(245,158,11,0.12);  border:1px solid #f59e0b; }
    .badge-rechazado { color:var(--accent); background:rgba(230,62,109,0.1); border:1px solid var(--accent); }
    .badge-revision  { color:var(--accent3); background:rgba(6,182,212,0.1); border:1px solid var(--accent3); }
    .badge-suspension{ color:#ff4444; background:rgba(255,68,68,0.1); border:1px solid #ff4444; }

    .obra-actions { display:flex; gap:8px; flex-shrink:0; }
    .btn-gestionar, .btn-editar {
      text-decoration:none; padding:7px 12px; border-radius:8px;
      font-size:0.72rem; font-weight:700; white-space:nowrap; transition:0.2s;
    }
    .btn-gestionar { color:var(--accent3); border:1px solid var(--accent3); }
    .btn-gestionar:hover { background:var(--accent3); color:#000; }
    .btn-editar { color:var(--text-muted); border:1px solid var(--border); }
    .btn-editar:hover { border-color:var(--accent); color:var(--accent); }

    .empty-obras {
      text-align:center; padding:50px 20px;
      border:1px dashed var(--border); border-radius:14px; color:var(--text-muted);
    }
    .empty-obras i { font-size:2rem; margin-bottom:12px; display:block; opacity:0.4; }

    /* ── Responsive ── */
    @media (max-width:600px) {
      .obra-card { gap:10px; }
      .obra-actions { flex-direction:column; gap:6px; }
      .btn-gestionar, .btn-editar { padding:6px 10px; font-size:0.68rem; }
    }
    @media (max-width:480px) {
      .obra-info h4 { font-size:0.88rem; }
      .obra-cover-mini, .obra-cover-ph { width:44px; height:62px; }
      .profile-card { padding:14px 16px; gap:14px; }
      .top-nav { padding:10px 14px; }
      .top-nav .brand { font-size:1rem; }
      .btn-home { padding:6px 10px; font-size:0.72rem; }
    }
    @media (max-width:360px) {
      .obra-actions { width:100%; flex-direction:row; justify-content:flex-end; }
      .obra-card { flex-wrap:wrap; }
    }
  </style>
</head>
<body>
  <div class="bg-grid"></div>

  <nav class="top-nav">
    <span class="brand">KOTATSUNAME</span>
    <div class="nav-links">
      <a href="index.html" class="btn-home">Biblioteca</a>
      <button class="btn-refresh" id="btnRefresh" onclick="refrescar()" title="Actualizar">
        <i class="fas fa-rotate-right" id="refreshIcon"></i>
      </button>
      <button class="logout" id="logoutBtn" title="Cerrar sesión">
        <i class="fas fa-power-off"></i>
      </button>
    </div>
  </nav>

  <main class="container">

    <div class="susp-banner" id="suspBanner">
      <strong>Tienes obras suspendidas</strong>
      El staff ha suspendido una o más de tus obras. Contacta a moderación si crees que es un error.
    </div>

    <!-- Perfil -->
    <div style="margin-bottom:20px;">
      <div class="profile-card">
        <div class="avatar-wrap">
          <img id="profileImg"
            src="data:image/svg+xml,<svg viewBox='0 0 1 1' fill='%231a1a28' xmlns='http://www.w3.org/2000/svg'><rect width='1' height='1'/></svg>"
            alt="Avatar" />
          <button class="avatar-btn" onclick="togglePhotoDrawer()" title="Cambiar foto">
            <i class="fas fa-camera"></i>
          </button>
        </div>
        <div class="profile-info">
          <p class="role">✦ Gremio de Escritores</p>
          <h2 id="profileName">Cargando...</h2>
          <p class="pid" id="profileId"></p>
        </div>
      </div>
      <div class="photo-drawer" id="photoDrawer">
        <label>Enlace de imagen (Google Drive)</label>
        <div class="photo-row">
          <input type="text" id="driveInput" placeholder="Pega el enlace de compartir de Drive..." />
          <button onclick="guardarFoto()">Actualizar</button>
        </div>
      </div>
    </div>

    <!-- Obras -->
    <div class="obras-header">
      <h3>Mis Manuscritos</h3>
      <a href="nueva_obra.html" class="btn-nueva">+ Nueva Obra</a>
    </div>

    <div id="listaObras">
      <div style="text-align:center;padding:40px;color:var(--text-muted);">
        <i class="fas fa-spinner fa-spin"></i>&nbsp; Cargando manuscritos...
      </div>
    </div>

  </main>

  <script type="module">
    import { loadEscritos, clearCache } from "./escritos_data.js";

    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxlwm_htimcLqGW7p5HQvdgqwY1V7tlr3oEt5vl6FMZ8j6TGyB3V8t4Dwd2t8vU9AZA/exec";

    const idAutor = (localStorage.getItem("ktt_id")   || "").trim();
    const user    = (localStorage.getItem("ktt_user") || "").trim();
    const foto    =  localStorage.getItem("ktt_foto") || "";
    const role    =  localStorage.getItem("ktt_role") || "user";

    if (!idAutor || idAutor === "null") { window.location.href = "registrarse.html"; }
    if (role !== "user") {
      const map = { owner:"panel_owner.html", admin:"panel_admin.html", mod:"panel_mod.html" };
      window.location.href = map[role] || "registrarse.html";
    }

    document.getElementById("profileName").textContent = user || "Autor";
    document.getElementById("profileId").textContent   = `ID: ${idAutor}`;
    if (foto && foto !== "undefined") document.getElementById("profileImg").src = foto;

    // ── Foto de perfil ──
    window.togglePhotoDrawer = () => document.getElementById("photoDrawer").classList.toggle("open");

    window.guardarFoto = async () => {
      const val = document.getElementById("driveInput").value.trim();
      if (!val) return;
      const match = val.match(/[-\w]{25,}/);
      if (!match) { alert("Enlace de Drive no válido."); return; }
      const url = `https://wsrv.nl/?url=${encodeURIComponent(
        `https://drive.google.com/uc?export=view&id=${match[0]}`
      )}&w=300&output=webp`;
      document.getElementById("profileImg").src = url;
      localStorage.setItem("ktt_foto", url);
      document.getElementById("photoDrawer").classList.remove("open");
      document.getElementById("driveInput").value = "";
      try {
        await fetch(SCRIPT_URL, {
          method:"POST", mode:"no-cors",
          body: JSON.stringify({ action:"actualizarFoto", idAutor, foto:url }),
        });
      } catch(e) {}
    };

    // ── Cargar obras ──
    async function cargarObras() {
      const container = document.getElementById("listaObras");
      try {
        const todas = await loadEscritos();
        const mias  = todas.filter(o => String(o.id_autor).trim() === idAutor);

        if (mias.length === 0) {
          container.innerHTML = `
            <div class="empty-obras">
              <i class="fas fa-scroll"></i>
              Aún no has publicado ningún manuscrito.<br>
              <a href="nueva_obra.html" style="color:var(--accent3);text-decoration:none;margin-top:12px;display:inline-block;">
                Crear mi primera obra →
              </a>
            </div>`;
          return;
        }

        // Banner suspensión
        if (mias.some(o => (o.aprobacion||"").toLowerCase() === "suspension")) {
          document.getElementById("suspBanner").style.display = "block";
        }

        const badgeMap = {
          aprobado  : ["badge-aprobado",   "Publicada"],
          true      : ["badge-aprobado",   "Publicada"],
          rechazado : ["badge-rechazado",  "Rechazada"],
          revision  : ["badge-revision",   "En Revisión"],
          suspension: ["badge-suspension", "Suspendida"],
          pendiente : ["badge-pendiente",  "Pendiente"],
        };

        container.innerHTML = mias.map(o => {
          const ap       = (o.aprobacion || "pendiente").trim().toLowerCase();
          const [bc, bt] = badgeMap[ap] || ["badge-pendiente","Pendiente"];

          // Portada miniatura — con fallback a emoji si falla la imagen
          const coverHtml = o.cover
            ? `<img class="obra-cover-mini"
                src="${o.cover}"
                alt="${o.titulo}"
                onerror="this.outerHTML='<div class=\\'obra-cover-ph\\'></div>'" />`
            : `<div class="obra-cover-ph"></div>`;

          return `
            <div class="obra-card">
              ${coverHtml}
              <div class="obra-info">
                <h4>${o.titulo}<span class="badge ${bc}">${bt}</span></h4>
                <small>
                  ${o.capitulos} CAP${o.capitulos !== 1 ? "S" : ""}
                  &nbsp;·&nbsp; ${(o.estado || "").toUpperCase()}
                </small>
              </div>
              <div class="obra-actions">
                <a href="nueva_obra.html?id=${o.id}"        class="btn-editar">Editar</a>
                <a href="gestion_capitulos.html?id=${o.id}" class="btn-gestionar">Capítulos</a>
              </div>
            </div>`;
        }).join("");

      } catch(e) {
        console.error(e);
        container.innerHTML = `<p style="color:var(--accent);text-align:center;padding:30px;">
          Error al cargar. <button onclick="refrescar()" style="background:none;border:none;color:var(--accent3);cursor:pointer;font-family:'Rajdhani';font-weight:700;">↻ Reintentar</button>
        </p>`;
      }
    }

    // ── Botón refrescar ──
    window.refrescar = async () => {
      const icon = document.getElementById("refreshIcon");
      icon.classList.add("spinning");
      clearCache();
      await cargarObras();
      setTimeout(() => icon.classList.remove("spinning"), 700);
    };

    // Si venimos de guardar, esperar a que el Sheet procese
    if (sessionStorage.getItem("panel_reload") === "1") {
      sessionStorage.removeItem("panel_reload");
      clearCache();
      setTimeout(cargarObras, 2000);
    } else {
      cargarObras();
    }

    document.getElementById("logoutBtn").onclick = () => {
      localStorage.clear();
      sessionStorage.clear();
      window.location.href = "registrarse.html";
    };
  </script>
</body>
</html>
