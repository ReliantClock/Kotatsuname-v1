<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lectura - Kotatsuname</title>
  <link rel="stylesheet" href="buscador.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Rajdhani:wght@300;400;500;600&family=Lora:ital,wght@0,500;0,600;1,500&family=Merriweather:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    /* ── Tema de lectura — fondo + texto del área de contenido ── */
    body.reading-theme {
      /* El fondo general permanece oscuro (nav, etc.) */
    }
    .reading-page,
    .reading-actions {
      transition: background-color 0.35s ease, color 0.35s ease;
    }
    /* Por defecto: modo oscuro normal */
    .reading-page { background: transparent; }

    /* ══ NAV STICKY — solo marca + chip ══ */
    .top-nav {
      position:sticky; top:0; z-index:200;
      background:rgba(10,10,15,0.95); backdrop-filter:blur(14px);
      -webkit-backdrop-filter:blur(14px);
      border-bottom:1px solid var(--border);
      padding:9px 18px;
      display:flex; align-items:center; justify-content:space-between; gap:10px;
    }
    .nav-left  { display:flex; align-items:center; gap:10px; flex-shrink:0; }
    .nav-right { display:flex; align-items:center; gap:8px; }

    /* Marca → index.html */
    .brand {
      font-family:'Cinzel Decorative'; color:var(--accent); font-size:1rem;
      text-decoration:none; display:inline-flex; align-items:center; gap:6px;
      transition:opacity .2s; white-space:nowrap; letter-spacing:.04em;
    }
    .brand:hover { opacity:.7; }
    .brand-icon { font-size:.6rem; color:var(--text-muted); }

    /* ── Chip de sesión (igual al index) ── */
    .user-chip {
      display:flex; align-items:center; gap:8px;
      background:var(--surface); border:1px solid var(--border);
      border-radius:50px; padding:5px 12px 5px 6px;
      cursor:pointer; transition:.2s; position:relative;
    }
    .user-chip:hover { border-color:var(--accent); }
    .user-chip img {
      width:24px; height:24px; border-radius:50%;
      object-fit:cover; border:1px solid var(--accent);
    }
    .chip-avatar-ph {
      width:24px; height:24px; border-radius:50%; flex-shrink:0;
      background:var(--surface2); border:1px solid var(--accent);
      display:flex; align-items:center; justify-content:center;
      font-size:.65rem; font-weight:700; color:var(--accent);
    }
    .user-chip .chip-name { font-size:.78rem; font-weight:600; color:var(--text); white-space:nowrap; }

    /* ── Dropdown sesiones (mismo estilo que index) ── */
    .sessions-panel {
      position:absolute; top:calc(100% + 8px); right:0;
      background:#12121e; border:1px solid var(--border);
      border-radius:13px; padding:9px; width:255px;
      box-shadow:0 14px 36px rgba(0,0,0,.8);
      display:none; flex-direction:column; gap:5px; z-index:500;
    }
    .sessions-panel.open { display:flex; animation:spDown .13s ease; }
    @keyframes spDown { from{opacity:0;transform:translateY(-4px)} to{opacity:1;transform:translateY(0)} }

    .sp-header {
      font-size:.56rem; font-weight:700; letter-spacing:.15em; text-transform:uppercase;
      color:var(--text-muted); padding-bottom:7px; border-bottom:1px solid var(--border);
    }
    .sp-accounts { max-height:240px; overflow-y:auto; display:flex; flex-direction:column; gap:4px; }
    .sp-accounts::-webkit-scrollbar { width:3px; }
    .sp-accounts::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }
    .sp-chip {
      display:flex; align-items:center; gap:8px; padding:7px 9px;
      background:rgba(26,26,40,.9); border-radius:8px; border:1px solid var(--border);
      cursor:pointer; transition:.15s;
    }
    .sp-chip:hover { border-color:var(--accent); background:#1a1a28; }
    .sp-chip.active { border-color:rgba(230,62,109,.35); background:rgba(230,62,109,.04); }
    .sp-av {
      width:28px; height:28px; border-radius:50%; background:var(--bg);
      border:2px solid var(--border); flex-shrink:0; overflow:hidden;
      display:flex; align-items:center; justify-content:center;
      font-size:.7rem; font-weight:700; color:var(--accent);
    }
    .sp-av img { width:100%; height:100%; object-fit:cover; }
    .sp-info   { flex:1; min-width:0; }
    .sp-name   { font-size:.8rem; font-weight:700; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .sp-email  { font-size:.58rem; color:var(--text-muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .sp-role   { font-size:.5rem; font-weight:700; letter-spacing:.07em; text-transform:uppercase; padding:1px 5px; border-radius:20px; flex-shrink:0; }
    .sp-role.user  { background:rgba(76,175,80,.12);  color:#4CAF50; }
    .sp-role.mod   { background:rgba(245,158,11,.12); color:#f59e0b; }
    .sp-role.admin { background:rgba(6,182,212,.12);  color:#06b6d4; }
    .sp-role.owner { background:rgba(230,62,109,.12); color:#e63e6d; }
    .sp-dot   { width:6px; height:6px; border-radius:50%; background:#4CAF50; flex-shrink:0; }
    .sp-divider { height:1px; background:var(--border); margin:2px 0; }
    .sp-action {
      display:flex; align-items:center; gap:7px; padding:6px 9px;
      border-radius:8px; border:none; background:transparent;
      font-family:'Rajdhani'; font-size:.72rem; font-weight:700;
      cursor:pointer; color:var(--text-muted); text-transform:uppercase;
      letter-spacing:.07em; width:100%; transition:.15s;
    }
    .sp-action:hover { color:var(--accent); background:rgba(230,62,109,.06); }

    /* ══ BARRA DE ACCIONES — debajo del nav, NO sticky ══ */
    .reading-actions {
      max-width:760px; margin:16px auto 0;
      padding:0 20px;
      display:flex; justify-content:space-between; align-items:center; gap:10px;
      position:relative; z-index:1;
    }
    .action-btn {
      display:inline-flex; align-items:center; gap:6px;
      text-decoration:none; background:transparent;
      padding:7px 15px; border-radius:7px; color:rgba(255,255,255,.85);
      font-family:'Rajdhani'; font-size:.78rem; font-weight:600;
      letter-spacing:.08em; border:1px solid var(--border);
      cursor:pointer; transition:all .25s;
    }
    .action-btn:hover { background:var(--accent); border-color:var(--accent); color:#fff; box-shadow:0 0 12px rgba(230,62,109,.3); }
    .action-btn.share { border-color:rgba(6,182,212,.4); color:var(--accent3); }
    .action-btn.share:hover { background:var(--accent3); border-color:var(--accent3); color:#000; box-shadow:0 0 12px rgba(6,182,212,.3); }

    /* ══ CONTENIDO ══ */
    /* Wrapper exterior — siempre oscuro, centra la "hoja" */
    .reading-page-wrap {
      max-width:820px; margin:0 auto;
      padding:0 10px 110px; position:relative; z-index:1;
    }
    /* Hoja de lectura — recibe el color de fondo del tema */
    .reading-page {
      max-width:760px; margin:8px auto;
      padding:28px 24px 48px;
      border-radius:12px;
      transition: background-color .35s ease, box-shadow .35s ease;
    }
    .read-header { border-bottom:1px solid var(--border); margin-bottom:32px; padding-bottom:18px; }
    .read-header .cap-number {
      font-size:.78rem; font-weight:700; letter-spacing:.2em;
      text-transform:uppercase; color:var(--accent); margin-bottom:6px;
    }
    .read-header h1 {
      font-family:var(--font-display); font-size:clamp(1.2rem,4vw,1.8rem);
      color:var(--text); margin-bottom:8px; line-height:1.2;
    }
    .read-header .book-ref { font-size:.88rem; color:var(--text-muted); font-style:italic; }
    .author-link { color:var(--accent3); text-decoration:none; border-bottom:1px dashed var(--accent3); transition:.2s; }
    .author-link:hover { color:#fff; border-bottom-color:#fff; }

    .reading-text {
      font-size:1.15rem; line-height:1.6; color:#ddd;
      white-space:pre-wrap; font-family:'Rajdhani',sans-serif; min-height:200px;
    }
    .loading-text {
      display:flex; align-items:center; gap:12px;
      color:var(--text-muted); font-size:.95rem; padding:40px 0;
    }
    .loading-text::before {
      content:""; width:18px; height:18px;
      border:2px solid var(--border); border-top-color:var(--accent);
      border-radius:50%; animation:spin .8s linear infinite; flex-shrink:0;
    }
    @keyframes spin { to { transform:rotate(360deg); } }

    .chapter-nav {
      display:flex; justify-content:space-between; align-items:center;
      margin-top:80px; padding-top:32px; border-top:1px solid var(--border); gap:12px;
    }
    .nav-cap-btn {
      text-decoration:none; background:transparent; padding:12px 20px;
      border-radius:8px; color:rgba(255,255,255,.7);
      font-family:var(--font-body); font-size:.9rem; font-weight:600;
      border:1px solid var(--border); cursor:pointer; transition:all .3s;
      text-align:center; flex:1; max-width:160px;
    }
    .nav-cap-btn:hover:not(.disabled) {
      background:var(--accent); border-color:var(--accent);
      color:#fff; box-shadow:0 0 15px rgba(230,62,109,.4);
    }
    .nav-cap-btn.disabled { opacity:0; pointer-events:none; }
    .nav-cap-btn.index-btn { max-width:120px; color:var(--text-muted); }
    .nav-cap-btn.index-btn:hover {
      border-color:var(--accent3); color:var(--accent3);
      background:rgba(6,182,212,.08); box-shadow:none;
    }
    .chapter-end {
      text-align:center; margin-top:60px; padding:30px;
      color:var(--text-muted); font-size:.85rem;
      letter-spacing:.15em; text-transform:uppercase;
      border-top:1px solid var(--border);
    }

    /* ══ CONTROLES FLOTANTES ══ */
    .reading-controls {
      position:fixed; bottom:24px; right:20px;
      display:flex; flex-direction:column; gap:5px; z-index:100;
      align-items:flex-end;
    }
    .control-btn {
      background:rgba(12,12,22,.8); backdrop-filter:blur(12px);
      -webkit-backdrop-filter:blur(12px);
      border:1px solid rgba(255,255,255,.09); color:rgba(255,255,255,.72);
      padding:8px 13px; cursor:pointer; border-radius:8px;
      font-size:.8rem; font-weight:700; font-family:'Rajdhani'; transition:all .2s;
    }
    .control-btn:hover { border-color:var(--accent); color:var(--accent); background:rgba(12,12,22,.95); }

    /* Panel fuente */
    .font-selector {
      background:rgba(12,12,22,.93); backdrop-filter:blur(14px);
      border:1px solid rgba(255,255,255,.09); border-radius:12px;
      padding:10px; display:none; flex-direction:column; gap:5px;
      box-shadow:0 8px 28px rgba(0,0,0,.6);
    }
    .font-selector.open { display:flex; }
    .font-opt {
      background:none; border:1px solid rgba(255,255,255,.06);
      color:rgba(255,255,255,.55); padding:6px 12px; border-radius:7px;
      cursor:pointer; font-size:.78rem; font-weight:600; transition:.18s; text-align:left;
    }
    .font-opt:hover,.font-opt.active { border-color:var(--accent3); color:var(--accent3); background:rgba(6,182,212,.07); }

    /* Panel tono */
    .tint-panel {
      background:rgba(12,12,22,.93); backdrop-filter:blur(14px);
      border:1px solid rgba(255,255,255,.09); border-radius:13px;
      padding:13px 14px; display:none; flex-direction:column; gap:10px;
      box-shadow:0 8px 28px rgba(0,0,0,.6); min-width:228px;
    }
    .tint-panel.open { display:flex; }
    .tint-panel-title { font-size:.57rem; font-weight:700; letter-spacing:.16em; text-transform:uppercase; color:rgba(255,255,255,.28); }
    .tint-sublabel { font-size:.54rem; color:rgba(255,255,255,.22); text-transform:uppercase; letter-spacing:.1em; margin-bottom:-3px; }
    .tint-grid { display:grid; grid-template-columns:repeat(5,1fr); gap:6px; }
    .tint-swatch {
      aspect-ratio:1; border-radius:7px; cursor:pointer;
      border:2px solid transparent; transition:all .18s; position:relative; min-width:0;
    }
    .tint-swatch:hover { transform:scale(1.1); }
    .tint-swatch.active { border-color:rgba(255,255,255,.85); }
    .tint-swatch.active::after {
      content:"✓"; position:absolute; inset:0; display:flex;
      align-items:center; justify-content:center;
      font-size:.6rem; color:#fff; font-weight:900; text-shadow:0 1px 3px rgba(0,0,0,.65);
    }
    .tint-intensity-row { display:flex; flex-direction:column; gap:4px; }
    .tint-intensity-label { font-size:.55rem; color:rgba(255,255,255,.3); text-transform:uppercase; letter-spacing:.1em; }
    .tint-slider {
      -webkit-appearance:none; appearance:none;
      width:100%; height:3px; border-radius:3px;
      background:rgba(255,255,255,.1); outline:none; cursor:pointer;
    }
    .tint-slider::-webkit-slider-thumb {
      -webkit-appearance:none; width:12px; height:12px; border-radius:50%;
      background:var(--accent); cursor:pointer; border:2px solid rgba(255,255,255,.2);
    }
    .tint-slider::-moz-range-thumb { width:12px; height:12px; border-radius:50%; background:var(--accent); cursor:pointer; border:none; }

    /* Responsive */
    @media(max-width:520px){
      .top-nav { padding:8px 12px; }
      .brand   { font-size:.82rem; }
      .chip-name { max-width:55px; overflow:hidden; text-overflow:ellipsis; }
      .reading-page { padding:22px 13px 110px; }
      .reading-actions { padding:0 13px; }
    }
  </style>
</head>
<body>
  <div class="bg-grid"></div>

  <!-- ══ NAV STICKY — solo marca + chip ══ -->
  <nav class="top-nav">
    <div class="nav-left">
      <a href="index.html" class="brand" title="Inicio">
        <i class="fas fa-house brand-icon"></i>
        KOTATSUNAME
      </a>
    </div>
    <div class="nav-right">
      <!-- Chip de sesión con dropdown -->
      <div style="position:relative;" id="chipWrap">
        <div class="user-chip" id="userChip" onclick="toggleSessionPanel(event)">
          <div class="chip-avatar-ph" id="chipAvPh">?</div>
          <img id="chipAvImg" src="" alt="" style="display:none;width:24px;height:24px;border-radius:50%;object-fit:cover;border:1px solid var(--accent);">
          <span class="chip-name" id="chipName">Lector</span>
          <i class="fas fa-chevron-down" id="chipCaret" style="font-size:.5rem;color:var(--text-muted);transition:transform .2s;margin-left:2px;"></i>
        </div>

        <div class="sessions-panel" id="sessionsPanel">
          <div class="sp-header">
            <i class="fas fa-id-card" style="margin-right:4px;"></i>Sesiones guardadas
          </div>
          <div class="sp-accounts" id="spAccountsList"></div>
          <div class="sp-divider"></div>
          <button class="sp-action" onclick="window.location.href='registrarse.html'">
            <i class="fas fa-right-to-bracket"></i> Cambiar sesión
          </button>
        </div>
      </div>
    </div>
  </nav>

  <!-- ══ ACCIONES — Volver y Compartir FUERA del nav ══ -->
  <div class="reading-actions">
    <button id="btnVolver" class="action-btn">
      <i class="fas fa-arrow-left" style="font-size:.65rem;"></i>Volver
    </button>
    <button id="btnCompartir" class="action-btn share">
      <i class="fas fa-share-nodes" style="font-size:.65rem;"></i> Compartir
    </button>
  </div>

  <!-- ══ CONTENIDO ══ -->
  <div class="reading-page" id="readingArea">
    <header class="read-header">
      <p class="cap-number" id="capNumber"></p>
      <h1 id="capTitle">Cargando...</h1>
      <p class="book-ref" id="bookRef"></p>
    </header>

    <div id="textCanvas" style="border-radius:10px;transition:background .35s ease,padding .35s ease;">
    <article id="capContent" class="reading-text">
      <div class="loading-text">Consultando los archivos...</div>
    </article>
    </div><!-- /textCanvas -->

    <div class="chapter-end">✦ Fin del capítulo ✦</div>

    <footer class="chapter-nav">
      <button id="btnPrev"  class="nav-cap-btn disabled">Anterior</button>
      <button id="btnIndex" class="nav-cap-btn index-btn">Índice</button>
      <button id="btnNext"  class="nav-cap-btn disabled">Siguiente</button>
    </footer>
  </div>

  <!-- ══ CONTROLES FLOTANTES ══ -->
  <div class="reading-controls">
    <div class="tint-panel" id="tintPanel">
      <span class="tint-panel-title">Tema de lectura</span>
      <span class="tint-sublabel">Noche</span>
      <div class="tint-grid" id="tintGridOscuros"></div>
      <span class="tint-sublabel">Papel / Sepia</span>
      <div class="tint-grid" id="tintGridCalidos"></div>
      <span class="tint-sublabel">Neutros / Noche</span>
      <div class="tint-grid" id="tintGridNeutros"></div>
      <div class="tint-intensity-row">
        <span class="tint-intensity-label">Claro ←  Tono  → Oscuro</span>
        <input type="range" class="tint-slider" id="tintSlider" min="0" max="100" value="30">
      </div>
    </div>

    <div class="font-selector" id="fontSelector">
      <button class="font-opt active" data-font="'Rajdhani', sans-serif">Rajdhani</button>
      <button class="font-opt" data-font="'Lora', serif">Lora</button>
      <button class="font-opt" data-font="'Merriweather', serif">Merriweather</button>
      <button class="font-opt" data-font="'Georgia', serif">Georgia</button>
      <button class="font-opt" data-font="'Courier New', monospace">Courier</button>
    </div>

    <button class="control-btn" id="fontDown"   title="Texto más pequeño">A−</button>
    <button class="control-btn" id="fontUp"     title="Texto más grande">A+</button>
    <button class="control-btn" id="fontToggle" title="Cambiar fuente">Aa</button>
    <button class="control-btn" id="tintToggle" title="Tono de fondo">☀</button>
  </div>

  <script type="module">
    import { loadEscritos } from "./escritos_data.js";

    const params    = new URLSearchParams(window.location.search);
    const libroId   = params.get("id");
    const numCap    = parseInt(params.get("num"))  || 1;
    const gnum      = parseInt(params.get("gnum")) || 1;
    const nombreCap = decodeURIComponent(params.get("nombre") || "");

    let fontSize    = parseFloat(localStorage.getItem("ktt_fontSize"))    || 1.15;
    let currentFont = localStorage.getItem("ktt_fontFamily") || "'Rajdhani', sans-serif";
    const indexUrl  = `escritos_capitulos.html?id=${libroId}`;

    // ═══════════════════════════════════════════
    //  CHIP DE SESIÓN CON DROPDOWN
    // ═══════════════════════════════════════════
    const userEmail = localStorage.getItem("ktt_email") || "";
    const userName  = localStorage.getItem("ktt_user")  || "";
    const userFoto  = localStorage.getItem("ktt_foto")  || "";

    // Rellenar chip
    document.getElementById("chipName").textContent = userName || "Lector";
    if (userFoto) {
      const img = document.getElementById("chipAvImg");
      img.src   = userFoto; img.style.display = "block";
      document.getElementById("chipAvPh").style.display = "none";
      img.onerror = () => {
        img.style.display = "none";
        const ph = document.getElementById("chipAvPh");
        ph.style.display  = "flex";
        ph.textContent    = (userName||"?")[0].toUpperCase();
      };
    } else {
      document.getElementById("chipAvPh").textContent = (userName||"?")[0].toUpperCase();
    }

    // Renderizar cuentas en el dropdown
    (function buildSessionList() {
      const list = document.getElementById("spAccountsList");
      let accounts = [];
      try { accounts = JSON.parse(localStorage.getItem("ktt_device_accounts") || "[]"); } catch {}
      if (!Array.isArray(accounts) || !accounts.length) {
        list.innerHTML = `<p style="font-size:.7rem;color:var(--text-muted);text-align:center;padding:6px 0;">Sin sesiones guardadas.</p>`;
        return;
      }
      const roleLabel = { user:"Autor", mod:"Mod", admin:"Admin", owner:"Owner" };
      list.innerHTML = "";
      accounts.forEach(acc => {
        const active  = acc.email === userEmail;
        const initial = (acc.nombre||"?")[0].toUpperCase();
        const chip    = document.createElement("div");
        chip.className = `sp-chip${active ? " active" : ""}`;
        chip.innerHTML = `
          <div class="sp-av">
            ${acc.foto
              ? `<img src="${esc(acc.foto)}" alt="" onerror="this.parentElement.textContent='${initial}'">`
              : initial}
          </div>
          <div class="sp-info">
            <div class="sp-name">${esc(acc.nombre)}</div>
            <div class="sp-email">${esc(acc.email)}</div>
          </div>
          <span class="sp-role ${acc.rol||"user"}">${roleLabel[acc.rol]||"Autor"}</span>
          ${active ? `<div class="sp-dot"></div>` : ""}
        `;
        chip.onclick = () => {
          closeSessionPanel();
          if (active) return;
          sessionStorage.setItem("ktt_prefill_email", acc.email);
          ["ktt_id","ktt_role","ktt_user","ktt_foto","ktt_email"].forEach(k => localStorage.removeItem(k));
          window.location.href = "registrarse.html";
        };
        list.appendChild(chip);
      });
    })();

    window.toggleSessionPanel = (e) => {
      e && e.stopPropagation();
      const panel  = document.getElementById("sessionsPanel");
      const caret  = document.getElementById("chipCaret");
      const isOpen = panel.classList.toggle("open");
      document.getElementById("userChip").style.borderColor = isOpen ? "var(--accent)" : "";
      caret.style.transform = isOpen ? "rotate(180deg)" : "";
      // Cerrar el resto
      document.getElementById("tintPanel").classList.remove("open");
      document.getElementById("fontSelector").classList.remove("open");
    };
    function closeSessionPanel() {
      document.getElementById("sessionsPanel").classList.remove("open");
      document.getElementById("chipCaret").style.transform = "";
      document.getElementById("userChip").style.borderColor = "";
    }

    // ═══════════════════════════════════════════
    //  TONOS DE FONDO
    // ═══════════════════════════════════════════
    // ═══════════════════════════════════════════
    //  TEMAS DE LECTURA
    //  bg = [h, s, l] del color base del lienzo de texto
    //  text = color del texto de lectura
    //  dark = true → tema oscuro (texto claro)
    //  El slider desplaza la luminosidad ±20 pts
    // ═══════════════════════════════════════════
    const THEMES = {
      oscuros: [
        { id:"none",        label:"Por defecto",     swatch:"repeating-linear-gradient(45deg,rgba(255,255,255,.07) 0,rgba(255,255,255,.07) 3px,transparent 3px,transparent 7px)", bg:null },
        { id:"carbon",      label:"Carbón",          swatch:"#1c1c1c",   bg:[0,0,11],      text:"#d4d4d4", dark:true  },
        { id:"grafito",     label:"Grafito",         swatch:"#2a2a2a",   bg:[0,0,17],      text:"#c8c8c8", dark:true  },
        { id:"pizarra",     label:"Pizarra azul",    swatch:"#1a2234",   bg:[218,28,16],   text:"#c2cfe0", dark:true  },
        { id:"noche_ind",   label:"Índigo noche",    swatch:"#191830",   bg:[245,30,15],   text:"#c4c0e0", dark:true  },
      ],
      calidos: [
        // Tonos oscuros cálidos — los nuevos que pediste
        { id:"espresso",    label:"Espresso",        swatch:"#1e1008",   bg:[25,55,8],     text:"#e0c8a0", dark:true  },
        { id:"cafe_os",     label:"Café oscuro",     swatch:"#2e1a08",   bg:[28,58,12],    text:"#e8d0a8", dark:true  },
        { id:"marron_os",   label:"Marrón oscuro",   swatch:"#3d1f0a",   bg:[24,62,15],    text:"#f0d8b4", dark:true  },
        { id:"marron_semi", label:"Marrón semiosc.", swatch:"#6b3514",   bg:[22,66,25],    text:"#f5e0c0", dark:true  },
        { id:"cobre",       label:"Cobre",           swatch:"#7a3a12",   bg:[20,72,28],    text:"#fae0bc", dark:true  },
        // Tonos claros cálidos (papel)
        { id:"crema",       label:"Crema",           swatch:"#fdf6e3",   bg:[46,78,94],    text:"#2c1f0e", dark:false },
        { id:"pergamino",   label:"Pergamino",       swatch:"#f0e0c0",   bg:[38,62,85],    text:"#2e1a08", dark:false },
        { id:"sepia",       label:"Sepia",           swatch:"#dcc8a0",   bg:[36,48,74],    text:"#201408", dark:false },
        { id:"arena",       label:"Arena",           swatch:"#c8b080",   bg:[38,44,63],    text:"#1e1000", dark:false },
        { id:"caramelo",    label:"Caramelo",        swatch:"#b8904c",   bg:[34,52,52],    text:"#180a00", dark:false },
      ],
      neutros: [
        // Tonos oscuros fríos/neutros — los nuevos
        { id:"verde_bos",   label:"Verde bosque",    swatch:"#0e2218",   bg:[145,48,10],   text:"#b8dcc4", dark:true  },
        { id:"verde_semi",  label:"Verde semiosc.",  swatch:"#1a3824",   bg:[140,40,17],   text:"#c4e0cc", dark:true  },
        { id:"oliva",       label:"Oliva oscuro",    swatch:"#2a3010",   bg:[72,48,13],    text:"#d0d8a0", dark:true  },
        { id:"musgo",       label:"Musgo",           swatch:"#203420",   bg:[120,28,17],   text:"#c0d8c0", dark:true  },
        { id:"azul_prof",   label:"Azul profundo",   swatch:"#0a1828",   bg:[212,60,12],   text:"#b8d0e8", dark:true  },
        // Claros neutros
        { id:"blanco",      label:"Blanco",          swatch:"#ffffff",   bg:[0,0,100],     text:"#1a1a1a", dark:false },
        { id:"gris_cl",     label:"Gris claro",      swatch:"#ededed",   bg:[0,0,93],      text:"#1a1a1a", dark:false },
        { id:"azulgris",    label:"Azul gris claro", swatch:"#d8e4f0",   bg:[210,30,89],   text:"#18283a", dark:false },
        { id:"verde_cl",    label:"Verde claro",     swatch:"#e4f0e4",   bg:[120,22,91],   text:"#142814", dark:false },
        { id:"lavanda",     label:"Lavanda",         swatch:"#ece8f8",   bg:[255,35,95],   text:"#1e1430", dark:false },
      ]
    };

        let currentTintId = localStorage.getItem("ktt_tintId") || "none";
    let tintShift     = parseInt(localStorage.getItem("ktt_tintShift") || "0");  // -30..+30

    function allThemes() { return [...THEMES.oscuros, ...THEMES.calidos, ...THEMES.neutros]; }

    function buildSwatches(groupKey, containerId) {
      const c = document.getElementById(containerId);
      THEMES[groupKey].forEach(t => {
        const sw = document.createElement("button");
        sw.className  = `tint-swatch${t.id === currentTintId ? " active" : ""}`;
        sw.title      = t.label;
        sw.dataset.id = t.id;
        sw.style.background = t.swatch;
        if (t.id === "none") sw.style.border = "2px solid rgba(255,255,255,.15)";
        sw.addEventListener("click", () => {
          currentTintId = t.id;
          localStorage.setItem("ktt_tintId", currentTintId);
          document.querySelectorAll(".tint-swatch").forEach(s => s.classList.remove("active"));
          sw.classList.add("active");
          applyTint();
        });
        c.appendChild(sw);
      });
    }
    buildSwatches("oscuros",  "tintGridOscuros");
    buildSwatches("calidos",  "tintGridCalidos");
    buildSwatches("neutros",  "tintGridNeutros");

    const slider = document.getElementById("tintSlider");
    // Reconfigurar slider: -30 oscurecer, 0 neutro, +30 aclarar
    slider.min   = "-30";
    slider.max   = "30";
    slider.value = tintShift;
    slider.addEventListener("input", () => {
      tintShift = parseInt(slider.value);
      localStorage.setItem("ktt_tintShift", tintShift);
      applyTint();
    });

    function applyTint() {
      // Solo el lienzo de texto cambia de fondo y color.
      // Header, botones de nav, chapter-end → siempre sin cambio.
      const canvas  = document.getElementById("textCanvas");
      const content = document.getElementById("capContent");
      const t       = allThemes().find(th => th.id === currentTintId);

      if (!t || !t.bg) {
        // Restaurar modo por defecto
        if (canvas)  { canvas.style.background = ""; canvas.style.padding = ""; canvas.style.boxShadow = ""; }
        if (content) { content.style.color = ""; }
        return;
      }

      // Calcular luminosidad con el slider (±20 pts)
      const [h, s, l] = t.bg;
      const lFinal = Math.max(2, Math.min(97, l + tintShift));
      const bgColor = `hsl(${h},${s}%,${lFinal}%)`;

      // Color del texto
      const textColor = t.text;

      // Aplicar SOLO al lienzo de texto
      if (canvas) {
        canvas.style.background = bgColor;
        canvas.style.padding    = "22px 20px 18px";
        canvas.style.boxShadow  = t.dark
          ? "inset 0 0 0 1px rgba(255,255,255,0.06)"
          : "inset 0 0 0 1px rgba(0,0,0,0.07)";
      }
      if (content) {
        content.style.color = textColor;
      }
    }

    // ═══════════════════════════════════════════
    //  FUENTE
    // ═══════════════════════════════════════════
    function applyFontPrefs() {
      const el = document.getElementById("capContent");
      if (el) { el.style.fontSize = `${fontSize}rem`; el.style.fontFamily = currentFont; }
      document.querySelectorAll(".font-opt").forEach(b => b.classList.toggle("active", b.dataset.font === currentFont));
    }

    // ═══════════════════════════════════════════
    //  CARGA CAPÍTULO
    // ═══════════════════════════════════════════
    function buildNavUrl(caps, targetGnum) {
      const cap = caps[targetGnum - 1];
      if (!cap) return null;
      return `libro_capitulo.html?id=${libroId}&num=${cap.numero}&gnum=${targetGnum}&nombre=${encodeURIComponent(cap.nombre||"")}`;
    }

    function configurarCompartir(libro, capNombre) {
      const btn = document.getElementById("btnCompartir");
      if (!btn) return;
      btn.addEventListener("click", async () => {
        const data = {
          title: `KotatsuName — ${libro.titulo}`,
          text : `Lee el Capítulo ${gnum}${capNombre ? `: "${capNombre}"` : ""} de "${libro.titulo}" en KotatsuName`,
          url  : window.location.href,
        };
        try {
          if (navigator.share) await navigator.share(data);
          else {
            await navigator.clipboard.writeText(window.location.href);
            const orig = btn.innerHTML;
            btn.textContent = "✓ Copiado";
            setTimeout(() => { btn.innerHTML = orig; }, 2000);
          }
        } catch(e) {}
      });
    }

    async function cargarCapitulo() {
      if (!libroId) { window.location.href = "index.html"; return; }
      applyFontPrefs(); applyTint();

      const libros = await loadEscritos();
      const libro  = libros.find(l => l.id == libroId);
      if (!libro) { window.location.href = "index.html"; return; }

      const caps          = libro.caps || [];
      const capActual     = caps.find(c => c.numero === numCap);
      const capNombreReal = capActual?.nombre || nombreCap || `Capítulo ${gnum}`;

      document.getElementById("capNumber").textContent = `Capítulo ${gnum}`;
      document.getElementById("capTitle").textContent  = capNombreReal;
      document.getElementById("bookRef").innerHTML =
        `<a href="escritos_capitulos.html?id=${libroId}" style="color:var(--text-muted);text-decoration:none;border-bottom:1px dashed var(--border);">${libro.titulo}</a>
         &nbsp;·&nbsp;
         <a href="perfil_autor.html?id=${encodeURIComponent(libro.id_autor)}" class="author-link">${libro.autor}</a>`;
      document.title = `${capNombreReal} — ${libro.titulo}`;

      configurarCompartir(libro, capNombreReal);

      const content = document.getElementById("capContent");
      if (!capActual?.urlTexto) {
        content.textContent = "Este capítulo aún no tiene contenido disponible.";
      } else {
        try {
          const res   = await fetch(capActual.urlTexto);
          if (!res.ok) throw new Error(`HTTP ${res.status}`);
          const texto = await res.text();
          content.textContent = texto.replace(/\r\n/g,"\n").replace(/\r/g,"\n").trim();
          applyFontPrefs(); window.scrollTo(0,0);
          if (gnum < caps.length) {
            setTimeout(() => {
              const sig = caps[gnum];
              if (sig?.urlTexto) fetch(sig.urlTexto,{priority:"low"}).catch(()=>{});
            }, 5000);
          }
        } catch {
          content.textContent = "No se pudo cargar el contenido. Verifica la conexión o el permiso del documento.";
        }
      }

      const total   = caps.length;
      const btnPrev = document.getElementById("btnPrev");
      const btnNext = document.getElementById("btnNext");
      const btnIdx  = document.getElementById("btnIndex");

      if (gnum > 1) {
        const url = buildNavUrl(caps, gnum-1);
        btnPrev.textContent = "← Anterior";
        btnPrev.classList.remove("disabled");
        btnPrev.addEventListener("click", () => { window.location.href = url; });
      }
      if (gnum < total) {
        const url = buildNavUrl(caps, gnum+1);
        btnNext.textContent = "Siguiente →";
        btnNext.classList.remove("disabled");
        btnNext.addEventListener("click", () => { window.location.href = url; });
      }
      btnIdx.addEventListener("click",    () => { window.location.href = indexUrl; });
      document.getElementById("btnVolver").addEventListener("click", () => { window.location.href = indexUrl; });
    }

    // ═══════════════════════════════════════════
    //  EVENTOS CONTROLES FLOTANTES
    // ═══════════════════════════════════════════
    document.getElementById("fontUp").addEventListener("click", () => {
      fontSize = Math.min(fontSize+.1, 2.0);
      localStorage.setItem("ktt_fontSize", fontSize); applyFontPrefs();
    });
    document.getElementById("fontDown").addEventListener("click", () => {
      fontSize = Math.max(fontSize-.1, 0.8);
      localStorage.setItem("ktt_fontSize", fontSize); applyFontPrefs();
    });
    document.getElementById("fontToggle").addEventListener("click", e => {
      e.stopPropagation();
      document.getElementById("fontSelector").classList.toggle("open");
      document.getElementById("tintPanel").classList.remove("open");
      closeSessionPanel();
    });
    document.querySelectorAll(".font-opt").forEach(btn => {
      btn.addEventListener("click", () => {
        currentFont = btn.dataset.font;
        localStorage.setItem("ktt_fontFamily", currentFont);
        applyFontPrefs();
        document.getElementById("fontSelector").classList.remove("open");
      });
    });
    document.getElementById("tintToggle").addEventListener("click", e => {
      e.stopPropagation();
      document.getElementById("tintPanel").classList.toggle("open");
      document.getElementById("fontSelector").classList.remove("open");
      closeSessionPanel();
    });

    // Cerrar todo al tocar fuera
    document.addEventListener("click", e => {
      const tp  = document.getElementById("tintPanel");
      const fs  = document.getElementById("fontSelector");
      const sp  = document.getElementById("sessionsPanel");
      const tt  = document.getElementById("tintToggle");
      const ft  = document.getElementById("fontToggle");
      const cw  = document.getElementById("chipWrap");
      if (!tp.contains(e.target)  && e.target !== tt) tp.classList.remove("open");
      if (!fs.contains(e.target)  && e.target !== ft) fs.classList.remove("open");
      if (!cw.contains(e.target))                     closeSessionPanel();
    });

    document.addEventListener("keydown", e => {
      if (e.key !== "Escape") return;
      document.getElementById("tintPanel").classList.remove("open");
      document.getElementById("fontSelector").classList.remove("open");
      closeSessionPanel();
    });

    function esc(s) {
      return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
    }

    cargarCapitulo();
  </script>
</body>
</html>
